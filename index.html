function switchTab(idx) {
  activeTabIdx = idx;
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.tabIdx) === idx);
  });
  renderTabBar();
  // 전환된 탭 스톱워치 tick 재시작
  const tab = tabs[idx];
  const swPanel = getPanelOf(idx);
  if (tab.sw.startTs !== null) {
    clearInterval(tab.sw.ticker);
    const tabRef = tab;
    tab.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').textContent = '⏸ 일시정지');
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').className = 'sw-btn sw-pause sw-toggle');
  } else {
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').textContent = '▶ 시작');
    swPanel?.querySelector('.sw-toggle') && (swPanel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle');
  }
  swTickPanel(swPanel, tab);
}

function addTab() {
  if (tabs.length >= MAX_TABS) return;
  const idx = tabs.length;
  const tab = makeTab(idx);
  tabs.push(tab);
  const panel = buildTabPanel(tab);
  document.getElementById('tab-panels').appendChild(panel);
  document.getElementById('section-checklist').style.display = 'block';
  switchTab(idx);
  updateAllSyncBtns();
}

function closeTab(e, idx) {
  e.stopPropagation();
  if (tabs.length <= 1) return;
  // 스톱워치 상태 저장 후 정지
  saveSwState(tabs[idx]);
  clearInterval(tabs[idx].sw.ticker);
  tabs.splice(idx, 1);
  // idx 재정렬
  tabs.forEach((t, i) => { t.idx = i; });
  // 패널 재정렬
  const panelsEl = document.getElementById('tab-panels');
  panelsEl.innerHTML = '';
  tabs.forEach(t => {
    const p = buildTabPanel(t);
    panelsEl.appendChild(p);
    if (t.mob) restorePanelForTab(t);
    // 돌고 있던 스톱워치 ticker 재등록
    if (t.sw.startTs !== null) {
      clearInterval(t.sw.ticker);
      const tabRef = t;
      t.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
    }
  });
  activeTabIdx = Math.min(activeTabIdx, tabs.length - 1);
  switchTab(activeTabIdx);
  updateAllSyncBtns();
}

function reorderTab(fromIdx, toIdx) {
  _dragTabIdx = -1;
  const panelsEl = document.getElementById('tab-panels');
  const panelByOldIdx = Array.from(panelsEl.children);

  const moved = tabs.splice(fromIdx, 1)[0];
  tabs.splice(toIdx, 0, moved);
  // t.idx는 아직 old index → 그걸로 패널 노드 위치 변경 (destroy 없이 이동만)
  tabs.forEach(t => panelsEl.appendChild(panelByOldIdx[t.idx]));
  // re-index + dataset 동기화
  tabs.forEach((t, i) => { t.idx = i; });
  Array.from(panelsEl.children).forEach((p, i) => { p.dataset.tabIdx = i; });

  activeTabIdx = moved.idx;
  switchTab(activeTabIdx);
  updateAllSyncBtns();
}

function restorePanelForTab(tab) {
  const panel = getPanelOf(tab.idx);
  if (!panel || !tab.mob) return;
  const mob = tab.mob;
  panel.querySelector('.mob-img').src = mobImg(mob.id);
  panel.querySelector('.mob-name').textContent = mob.name;
  panel.querySelector('.mob-stats').textContent = '';
  panel.querySelector('.mob-link').href = `https://mapledb.kr/search.php?q=${mob.id}&t=mob`;
  // 아이템 그리드 복원
  renderItemGridInPanel(panel, mob);
  updateProgressInPanel(panel, mob);
  updateHuntEstimateInPanel(panel, mob);
  // 획득 기록 복원
  restoreLogEntries(panel, mob);
  renderTimeline(panel, mob, tabs.find(t => t.mob?.id === mob.id) || activeTab());
  // sw 버튼 상태 반영
  const swToggleBtn = panel.querySelector('.sw-toggle');
  if (swToggleBtn) {
    if (tab.sw.startTs !== null) {
      swToggleBtn.textContent = '⏸ 일시정지'; swToggleBtn.className = 'sw-btn sw-pause sw-toggle';
    } else {
      swToggleBtn.textContent = '▶ 시작'; swToggleBtn.className = 'sw-btn sw-start sw-toggle';
    }
  }
  swTickPanel(panel, tab);
}

// ══════════════════════════════════════════
// 11. 몬스터 활성화
// ══════════════════════════════════════════
function activateMob(mob) {
  const tab = activeTab();

  // 이전 몹 sw 상태 저장 (다른 몹으로 교체 시)
  if (tab.mob && tab.mob.id !== mob.id) {
    saveSwState(tab);
  }

  // 현재 탭에 몹 할당
  tab.mob = mob;

  // 탭 패널이 없으면 첫 탭 패널 생성
  if (!document.querySelector('.tab-panel')) {
    const panel = buildTabPanel(activeTab());
    document.getElementById('tab-panels').appendChild(panel);
  }

  const panel = getActivePanel();

  // 그리드 선택 표시
  document.querySelectorAll('.mob-card').forEach(c =>
    c.classList.toggle('sel', parseInt(c.dataset.mobId) === mob.id)
  );

  // 헤더 업데이트
  panel.querySelector('.mob-img').src = mobImg(mob.id);
  panel.querySelector('.mob-name').textContent = mob.name;
  panel.querySelector('.mob-stats').textContent = '';
  panel.querySelector('.mob-link').href = `https://mapledb.kr/search.php?q=${mob.id}&t=mob`;

  // 몬스터 이름/drops meta 저장
  const s = loadS();
  s[`mob_${mob.id}_meta`] = { name: mob.name, total: mob.drops.length, drops: mob.drops };
  saveS(s);

  // 스톱워치 상태 복원 (몹별 저장된 시간)
  restoreSwState(tab, mob);
  panel.querySelector('.sw-toggle').textContent = '▶ 시작';
  panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
  swTickPanel(panel, tab);

  // 스톱워치 로그 복원
  panel.querySelector('.sw-log-list').innerHTML = '';
  restoreLogEntries(panel, mob);
  renderTimeline(panel, mob, tab);

  renderItemGrid();

  const sec = document.getElementById('section-checklist');
  sec.style.display = 'block';
  renderTabBar();
  sec.scrollIntoView({ behavior:'smooth', block:'start' });
}

// 12. 아이템 그리드 렌더
// ══════════════════════════════════════════
const showExcludedByTab = {}; // 탭별 제외 아이템 보기 상태
function getShowExcluded() { return showExcludedByTab[activeTabIdx] !== false; }
function setShowExcluded(v) { showExcludedByTab[activeTabIdx] = v; }

function toggleExclView() {
  setShowExcluded(!getShowExcluded());
  const show = getShowExcluded();
  const panel = getActivePanel();
  if (!panel) return;
  const btn = panel.querySelector('.excl-toggle');
  btn.textContent = show ? '👁 제외된 아이템 보기' : '🚫 제외된 아이템 숨기는 중';
  btn.className   = show ? 'excl-toggle' : 'excl-toggle hide-excl';
  panel.querySelectorAll('.item-card.excl').forEach(c => {
    c.style.display = show ? '' : 'none';
  });
}

function getExcluded() {
  const store = loadS();
  return new Set(store[`excl_${activeMob.id}`] || []);
}

function setExcluded(set) {
  const store = loadS();
  store[`excl_${activeMob.id}`] = [...set];
  saveS(store);
}

// tl_base_${mobId} = { id, hidden } | null
// 사냥 횟수 기준 아이템. hidden=true면 타임라인/기록에서도 숨김
function getTlBase(mobId) { return loadS()[`tl_base_${mobId}`] || null; }
function setTlBase(mobId, val) {
  const store = loadS();
  if (val == null) delete store[`tl_base_${mobId}`];
  else             store[`tl_base_${mobId}`] = val;
  saveS(store);
}
function toggleTlBase(e, itemId) {
  e.stopPropagation();
  const mobId = activeMob.id;
  const cur = getTlBase(mobId);
  if (!cur || cur.id !== itemId) {
    setTlBase(mobId, { id: itemId, hidden: false }); // 다른 아이템 → 기준 지정 (타임라인 표시)
  } else if (!cur.hidden) {
    setTlBase(mobId, { id: itemId, hidden: true });  // 같은 아이템 재클릭 → 타임라인 숨김
  } else {
    setTlBase(mobId, null);                           // 한 번 더 → 해제
  }
  renderItemGrid();
  const panel = getActivePanel();
  renderTimeline(panel, activeMob, activeTab());
  const list = panel?.querySelector('.sw-log-list');
  if (list) { list.innerHTML = ''; restoreLogEntries(panel, activeMob); }
  updateProgress();
  updateHuntEstimate();
}

function renderItemGrid() {
  const panel = getActivePanel();
  if (!panel || !activeMob) return;
  renderItemGridInPanel(panel, activeMob);
  updateProgress();
}

function renderItemGridInPanel(panel, mob) {
  const grid = panel.querySelector('.item-grid');
  grid.innerHTML = '';
  const store = loadS();
  const key = `mob_${mob.id}`;
  const mobData  = store[key] || {};
  const excluded = new Set(store[`excl_${mob.id}`] || []);
  const tlBase   = getTlBase(mob.id);

  mob.drops.forEach(drop => {
    const state      = mobData[drop.id] || { count:0, firstTime:null };
    const isExcl     = excluded.has(drop.id);
    const baseState  = tlBase?.id === drop.id ? (tlBase.hidden ? 2 : 1) : 0;
    const card       = buildItemCard(drop, state, isExcl, baseState);
    if (isExcl && !getShowExcluded()) card.style.display = 'none';
    grid.appendChild(card);
  });
}

// baseState: 0=없음, 1=기준(타임라인표시), 2=기준(타임라인숨김)
function buildItemCard(drop, state, isExcl = false, baseState = 0) {
  const found    = state.count > 0 && !isExcl;
  const baseCls  = baseState === 2 ? ' tl-base-hidden' : baseState === 1 ? ' tl-base' : '';
  const cls      = isExcl ? 'excl' : (found ? 'fd' : 'nf');
  const card     = document.createElement('div');
  card.className = `item-card ${cls}${baseCls} fade-in`;
  card.dataset.itemId = drop.id;

  const baseTip  = baseState === 0 ? '사냥 횟수 기준으로 지정' :
                   baseState === 1 ? '다시 클릭: 타임라인에서도 숨기기' : '다시 클릭: 해제';

  card.innerHTML = `
    <div class="icon-wrap">
      <img src="${itemImg(drop.id)}" alt="${escHtml(drop.name)}" onerror="onItemImgError(this,${drop.id})">
      <span class="cn" style="${found?'':'display:none'}">${state.count}</span>
    </div>
    <div class="card-body">
      <div class="cname" title="${escHtml(drop.name)}">${escHtml(drop.name)}</div>
      <div class="crate">${isExcl ? '<span style="font-size:.6rem;color:#4a3030">제외됨</span>' : rateBadge(drop.rate)}</div>
      <div class="ccnt">${isExcl ? '' : `수집 ${state.count}회`}</div>
      <div class="ctime">${(!isExcl && state.firstTime !== null) ? '첫 출현 ' + fmtTime(state.firstTime) : ''}</div>
    </div>
    <button class="excl-btn" title="${isExcl?'제외 해제':'이 아이템 제외'}"
            onclick="toggleExclude(event,${drop.id})">${isExcl ? '↩' : '✕'}</button>
    ${!isExcl ? `<button class="tl-base-btn" title="${baseTip}"
            onclick="toggleTlBase(event,${drop.id})">⚑</button>` : ''}
    ${!isExcl ? `<button class="decr" title="수집 1 감소" onclick="decrementItem(event,${drop.id})">−</button>` : ''}
    ${!isExcl ? `<button class="bulk-btn" title="수량 일괄 조정" onclick="bulkBtnClick(event,${drop.id})">≡</button>` : ''}
  `;

  if (!isExcl) card.addEventListener('click', () => incrementItem(drop.id));
  return card;
}

function toggleExclude(e, itemId) {
  e.stopPropagation();
  const excl = getExcluded();
  if (excl.has(itemId)) excl.delete(itemId);
  else                   excl.add(itemId);
  setExcluded(excl);
  renderItemGrid();
  renderSaves();
}

// ── Bulk popup ──
let _bpItemId = null;
let _bpPendingDelta = 0;
let _bpOrigCount = 0;

function bulkBtnClick(e, itemId) {
  e.stopPropagation();
  openBulkPopup(itemId);
}

function openBulkPopup(itemId) {
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;
  const store = loadS();
  const state = store[`mob_${activeMob.id}`]?.[itemId] || { count:0 };
  _bpItemId = itemId;
  _bpPendingDelta = 0;
  _bpOrigCount = state.count;

  const bpIconEl = document.getElementById('bp-icon');
  bpIconEl.src = itemImg(itemId);
  bpIconEl.onerror = function(){ onItemImgError(this, itemId); };
  document.getElementById('bp-name').textContent = drop.name;
  _bpRenderCount();
  document.getElementById('bulk-overlay').classList.add('open');
}

function _bpRenderCount() {
  const newCount = Math.max(0, _bpOrigCount + _bpPendingDelta);
  document.getElementById('bp-count').textContent = newCount;
  const hint = document.getElementById('bp-delta-hint');
  const confirm = document.getElementById('bp-confirm');
  if (_bpPendingDelta === 0) {
    hint.textContent = '';
    hint.className = 'bp-delta-hint';
    confirm.disabled = true;
  } else {
    const sign = _bpPendingDelta > 0 ? '+' : '';
    hint.textContent = `${_bpOrigCount}개 → ${newCount}개 (${sign}${_bpPendingDelta})`;
    hint.className = 'bp-delta-hint ' + (_bpPendingDelta > 0 ? 'pos' : 'neg');
    confirm.disabled = false;
  }
}

function bulkAdjust(delta) {
  const newCount = _bpOrigCount + _bpPendingDelta + delta;
  if (newCount < 0 && delta < 0) {
    // clamp: don't go below 0
    _bpPendingDelta = -_bpOrigCount;
  } else {
    _bpPendingDelta += delta;
  }
  _bpRenderCount();
}

function applyBulk() {
  if (!activeMob || _bpItemId == null || _bpPendingDelta === 0) { closeBulkPopup(); return; }
  const drop = activeMob.drops.find(d => d.id === _bpItemId);
  if (!drop) { closeBulkPopup(); return; }
  const store = loadS();
  const key = `mob_${activeMob.id}`;
  if (!store[key]) store[key] = {};
  const state = store[key][_bpItemId] || { count:0, firstTime:null, times:[] };
  if (!state.times) state.times = state.firstTime ? [state.firstTime] : [];
  const newCount = Math.max(0, state.count + _bpPendingDelta);
  const t = swElapsed(activeTab());
  if (newCount > state.count) {
    // adding items: record times for each added
    const wasZero = state.count === 0;
    if (wasZero && newCount > 0) state.firstTime = t;
    for (let i = state.count; i < newCount; i++) state.times.push(t);
    if (wasZero && newCount > 0) addSwLogToPanel(getActivePanel(), drop.name, state.firstTime, _bpItemId);
  } else if (newCount < state.count) {
    // removing items: pop from times
    for (let i = state.count; i > newCount; i--) state.times.pop();
    if (newCount === 0) { state.firstTime = null; state.times = []; removeItemLog(getActivePanel(), _bpItemId); }
  }
  state.count = newCount;
  store[key][_bpItemId] = state;
  saveS(store);
  updateCardUI(_bpItemId, state, drop);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
  closeBulkPopup();
}

function closeBulkPopup() {
  document.getElementById('bulk-overlay').classList.remove('open');
  _bpItemId = null;
}

function bulkOverlayClick(e) {
  if (e.target === document.getElementById('bulk-overlay')) closeBulkPopup();
}

function incrementItem(itemId) {
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;

  const store = loadS();
  const key = `mob_${activeMob.id}`;
  if (!store[key]) store[key] = {};
  const state = store[key][itemId] || { count:0, firstTime:null, times:[] };
  if (!state.times) state.times = state.firstTime ? [state.firstTime] : [];
  const isFirst = state.count === 0;
  const t = swElapsed(activeTab());
  if (isFirst) state.firstTime = t;
  state.times.push(t);
  state.count++;
  store[key][itemId] = state;
  saveS(store);

  updateCardUI(itemId, state, drop);
  if (isFirst) addSwLogToPanel(getActivePanel(), drop.name, state.firstTime, itemId);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
}

function decrementItem(e, itemId) {
  e.stopPropagation();
  if (!activeMob) return;
  const drop = activeMob.drops.find(d => d.id === itemId);
  if (!drop) return;

  const store = loadS();
  const key = `mob_${activeMob.id}`;
  const state = store[key]?.[itemId];
  if (!state || state.count <= 0) return;
  state.count--;
  if (state.times) state.times.pop();
  if (state.count === 0) { state.firstTime = null; state.times = []; removeItemLog(getActivePanel(), itemId); }
  store[key][itemId] = state;
  saveS(store);

  updateCardUI(itemId, state, drop);
  updateProgress();
  updateHuntEstimate();
  renderSaves();
  renderTimeline(getActivePanel(), activeMob, activeTab());
}

function updateCardUI(itemId, state, drop) {
  const panel = getActivePanel();
  const card = panel ? panel.querySelector(`[data-item-id="${itemId}"]`) : document.querySelector(`[data-item-id="${itemId}"]`);
  if (!card) return;

  const found = state.count > 0;
  card.className = `item-card ${found ? 'fd' : 'nf'}`;

  if (found) card.classList.add('found-flash');
  setTimeout(() => card.classList.remove('found-flash'), 500);

  const badge = card.querySelector('.cn');
  badge.textContent = state.count;
  badge.style.display = found ? '' : 'none';

  card.querySelector('.ccnt').textContent  = `수집 ${state.count}회`;
  card.querySelector('.ctime').textContent =
    state.firstTime !== null ? `첫 출현 ${fmtTime(state.firstTime)}` : '';
}

// 14. 스톱워치 로그
// ══════════════════════════════════════════
function removeItemLog(panel, itemId) {
  if (!panel) return;
  panel.querySelectorAll(`.sw-log-entry[data-drop-id="${itemId}"]`).forEach(el => el.remove());
}

function addSwLogToPanel(panel, name, ms, dropId) {
  if (!panel) return;
  const list = panel.querySelector('.sw-log-list');
  const entry = document.createElement('div');
  entry.className = 'sw-log-entry fade-in';
  if (dropId != null) entry.dataset.dropId = dropId;
  entry.innerHTML = `<span class="lt">${fmtTimeLog(ms)}</span><span class="ln">${escHtml(name)}</span><button class="ldel" title="삭제" onclick="deleteLogEntry(this)">✕</button>`;
  list.insertBefore(entry, list.firstChild);
}
function deleteLogEntry(btn) {
  const entry = btn.closest('.sw-log-entry');
  const dropId = entry.dataset.dropId ? Number(entry.dataset.dropId) : null;
  if (dropId != null && activeMob) {
    const s = loadS();
    const key = `mob_${activeMob.id}`;
    if (s[key]?.[dropId]) {
      s[key][dropId].firstTime = null;
      saveS(s);
      const card = getActivePanel()?.querySelector(`.item-card[data-item-id="${dropId}"]`);
      if (card) card.querySelector('.ctime').textContent = '';
      renderTimeline(getActivePanel(), activeMob, activeTab());
    }
  }
  entry.remove();
}

// ══════════════════════════════════════════
// 15. 진행도
// ══════════════════════════════════════════
function updateProgress() {
  const panel = getActivePanel();
  if (!panel || !activeMob) return;
  updateProgressInPanel(panel, activeMob);
}

function updateProgressInPanel(panel, mob) {
  const store   = loadS();
  const mobData = store[`mob_${mob.id}`] || {};
  const excl    = new Set(store[`excl_${mob.id}`] || []);
  const tlBaseId = store[`tl_base_${mob.id}`]?.id;

  const active  = mob.drops.filter(d => !excl.has(d.id) && d.id !== tlBaseId);
  const total   = active.length;
  const done    = active.filter(d => (mobData[d.id]?.count||0) > 0).length;
  const pct     = total ? Math.round(done/total*100) : 0;
  const exclCnt = excl.size;

  panel.querySelector('.prog-cnt').textContent  = `${done} / ${total} 완료${exclCnt ? `  (제외 ${exclCnt}개)` : ''}`;
  panel.querySelector('.prog-pct').textContent  = `${pct}%`;
  panel.querySelector('.prog-fill').style.width = `${pct}%`;

  const justCompleted = done === total && total > 0;
  const badge = panel.querySelector('.complete-badge');
  const wasComplete = badge.style.display === 'block';
  badge.style.display = justCompleted ? 'block' : 'none';

  // 방금 완료된 경우 (이전에 안 완료 상태였을 때만)
  if (justCompleted && !wasComplete) {
    onDogamComplete(panel, mob);
  }

  updateHuntEstimateInPanel(panel, mob);
}

function updateHuntEstimate() {
  const panel = getActivePanel();
  if (!panel || !activeMob) return;
  updateHuntEstimateInPanel(panel, activeMob);
}

function updateHuntEstimateInPanel(panel, mob) {
  const store   = loadS();
  const mobData = store[`mob_${mob.id}`] || {};
  const excl    = new Set(store[`excl_${mob.id}`] || []);
  const tlBase  = store[`tl_base_${mob.id}`] || null;

  let bestRate = 0, bestDrop = null, bestCount = 0;

  // 사냥 기준 아이템이 지정된 경우 해당 아이템만 사용
  if (tlBase) {
    const drop = mob.drops.find(d => d.id === tlBase.id);
    if (drop) {
      const count = mobData[drop.id]?.count || 0;
      const rate  = parseFloat(drop.rate) / 100;
      if (count > 0 && rate > 0) { bestDrop = drop; bestCount = count; bestRate = rate; }
    }
  } else {
    mob.drops.forEach(drop => {
      if (excl.has(drop.id)) return;
      const count = mobData[drop.id]?.count || 0;
      if (count <= 0) return;
      const rate = parseFloat(drop.rate) / 100;
      if (!rate || rate <= 0) return;
      if (rate > bestRate) { bestRate = rate; bestDrop = drop; bestCount = count; }
    });
  }

  const wrap = panel.querySelector('.hunt-estimate');
  if (!bestDrop) { wrap.style.display = 'none'; return; }

  const estimated = Math.round(bestCount / bestRate);
  wrap.style.display = '';
  panel.querySelector('.hunt-count').innerHTML = `${estimated.toLocaleString()}마리`;
  const label = `${bestDrop.name} ${bestCount}개 / ${bestDrop.rate}`;
  panel.querySelector('.hunt-reason').textContent = label;
}


// ══════════════════════════════════════════
// 15-B. 도감작 완료 이벤트
// ══════════════════════════════════════════
function onDogamComplete(panel, mob) {
  const tab = tabs.find(t => t.mob && t.mob.id === mob.id);

  // 1. 스톱워치 멈추기
  if (tab) {
    const sw = tab.sw;
    if (sw.startTs !== null) {
      sw.base += Date.now() - sw.startTs;
      sw.startTs = null;
      clearInterval(sw.ticker); sw.ticker = null;
      saveSwState(tab);
      panel.querySelector('.sw-toggle').textContent = '▶ 시작';
      panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
    }
    const elapsed = swElapsed(tab);

    // 2. 획득 기록에 완료 항목 추가
    const list = panel.querySelector('.sw-log-list');
    const entry = document.createElement('div');
    entry.className = 'sw-log-entry complete fade-in';
    entry.innerHTML = `<span class="lt">${fmtTimeLog(elapsed)}</span><span class="ln">★ 도감작 완료!</span>`;
    list.insertBefore(entry, list.firstChild);

  }

  // 3. 메소 비
  mesoRain();
}

let _mesoRafId = null, _mesoTimeout = null, _mesoFadeId = null;
function mesoRain() {
  // 이전 애니메이션 중단
  if (_mesoRafId)   { cancelAnimationFrame(_mesoRafId); _mesoRafId = null; }
  if (_mesoTimeout) { clearTimeout(_mesoTimeout); _mesoTimeout = null; }
  if (_mesoFadeId)  { clearTimeout(_mesoFadeId); _mesoFadeId = null; }

  const canvas = document.getElementById('meso-rain');
  canvas.style.transition = '';
  canvas.style.opacity = '1';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const COLORS = [
    '#ffd700','#ffe566','#f5a623','#ffec80',  // 골드
    '#e8e8e8','#ffffff','#c8c8c8','#f0f0f0',  // 실버
    '#ffd700','#e8e8e8','#ffd700','#ffffff',  // 골드/실버 가중치
  ];

  const pieces = [];
  const COUNT  = 280;

  for (let i = 0; i < COUNT; i++) {
    pieces.push({
      x:      Math.random() * canvas.width,
      y:      -20 - Math.random() * canvas.height * 1.2,
      w:      5 + Math.random() * 7,
      h:      3 + Math.random() * 4,
      color:  COLORS[Math.floor(Math.random() * COLORS.length)],
      vx:     (Math.random() - 0.5) * 1.5,
      vy:     0.8 + Math.random() * 1.8,
      rot:    Math.random() * Math.PI * 2,
      rotV:   (Math.random() - 0.5) * 0.18,
      swing:  Math.random() * Math.PI * 2,
      swingS: 0.03 + Math.random() * 0.04,
      alpha:  0.85 + Math.random() * 0.15,
    });
  }

  let rafId;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    for (const p of pieces) {
      if (p.y > canvas.height + 20) continue;
      alive++;
      p.swing += p.swingS;
      p.x   += p.vx + Math.sin(p.swing) * 0.8;
      p.y   += p.vy;
      p.rot += p.rotV;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      // 앞면: 불투명, 뒷면(옆으로 기울 때): 얇아짐
      const scaleX = Math.cos(p.swing);
      ctx.scale(scaleX, 1);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = 3;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (alive > 0) _mesoRafId = requestAnimationFrame(loop);
    else { _mesoRafId = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  loop();

  // 9.5s 후 서서히 투명해짐 (2.5s 페이드)
  _mesoFadeId = setTimeout(() => {
    canvas.style.transition = 'opacity 2.5s ease-out';
    canvas.style.opacity = '0';
    _mesoFadeId = null;
  }, 9500);

  // 12.5s 후 완전 정리
  _mesoTimeout = setTimeout(() => {
    if (_mesoRafId) { cancelAnimationFrame(_mesoRafId); _mesoRafId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.transition = '';
    canvas.style.opacity = '1';
  }, 12500);
}

function exportData() {

  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `maple_dogam_backup_${date}.json`;

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (typeof parsed !== 'object' || parsed === null) throw new Error();
      if (!confirm('기존 데이터가 모두 교체됩니다.\n계속하시겠습니까?')) return;
      localStorage.setItem(S_KEY, JSON.stringify(parsed));
      location.reload();
    } catch {
      alert('올바른 백업 파일이 아닙니다.');
    }
  };
  reader.readAsText(file);
}

function renderSaves() {
  const store = loadS();
  const el = document.getElementById('saves-list');
  el.innerHTML = '';

  // mob_숫자 형태만 (mob_숫자_meta 등 제외)
  const keys = Object.keys(store).filter(k => /^mob_\d+$/.test(k));
  if (!keys.length) {
    el.innerHTML = '<span class="no-saves">아직 시작한 도감작이 없습니다.</span>'; return;
  }

  keys.forEach(key => {
    const mobId = parseInt(key.replace('mob_',''));
    const preset = PRESET.find(m => m.id === mobId);
    const savedName = (activeMob && activeMob.id === mobId)
      ? activeMob.name
      : (preset ? preset.name : (store[`mob_${mobId}_meta`]?.name || `#${mobId}`));
    const items  = store[key] || {};
    const excl      = new Set(store[`excl_${mobId}`] || []);
    const tlBaseId  = store[`tl_base_${mobId}`]?.id;
    const meta      = store[`mob_${mobId}_meta`] || {};
    let done, total;
    if (activeMob && activeMob.id === mobId) {
      const activeDrops = activeMob.drops.filter(d => !excl.has(d.id) && d.id !== tlBaseId);
      total = activeDrops.length;
      done  = activeDrops.filter(d => (items[d.id]?.count||0) > 0).length;
    } else {
      const baseAdj = tlBaseId ? 1 : 0;
      const allTotal = meta.total || Object.keys(items).length;
      total = Math.max(1, allTotal - excl.size - baseAdj);
      done  = Math.min(total, Object.entries(items).filter(([id,s]) => !excl.has(Number(id)) && Number(id) !== tlBaseId && (s.count||0)>0).length);
    }
    const isAct  = activeMob && activeMob.id === mobId;
    const full   = total > 0 && done === total;
    const pct    = total > 0 ? Math.round(done / total * 100) : 0;

    const card = document.createElement('div');
    card.className = 'save-card' + (isAct ? ' act' : '') + (full ? ' complete' : '');
    const swSaved = store[`sw_mob_${mobId}`];
    const activeT = tabs.find(t => t.mob && t.mob.id === mobId);
    const elapsedMs = activeT ? swElapsed(activeT) : (swSaved?.base || 0);
    const elapsedStr = elapsedMs >= 1000 ? fmtTimeLog(elapsedMs) : '';
    card.innerHTML = `
      <button class="save-card-del" data-key="${key}" title="삭제">✕</button>
      <div class="save-card-name" title="${escHtml(savedName)}">${escHtml(savedName)}</div>
      <div class="save-card-pct">${pct}%</div>
      <div class="save-card-count">${done} / ${total}</div>
      <div class="save-card-bar-bg">
        <div class="save-card-bar-fill" style="width:${pct}%"></div>
      </div>
      ${elapsedStr ? `<div style="font-size:.6rem;color:#aaa;margin-top:5px">⏱ ${elapsedStr}</div>` : ''}
    `;
    card.addEventListener('click', e => {
      if (e.target.classList.contains('save-card-del')) {
        const k = e.target.dataset.key;
        if (confirm(`"${savedName}" 진행도를 삭제할까요?`)) {
          const s = loadS(); delete s[k]; saveS(s); renderSaves();
          if (activeMob && activeMob.id === mobId) renderItemGrid();
        }
        return;
      }
      // 이미 어떤 탭에 열려있으면 그 탭으로 전환
      const existingTab = tabs.find(t => t.mob && t.mob.id === mobId);
      if (existingTab) { switchTab(existingTab.idx); return; }
      // 현재 탭이 비어있으면 그냥 여기서 열기, 아니면 새 탭 추가
      if (activeTab().mob && tabs.length < MAX_TABS) addTab();
      if (preset) activateMob(preset);
      else fetchMobDrops(mobId, savedName, 0);
    });
    el.appendChild(card);
  });
}

function saveTrophyFromModal() {
  const ctx = window._trophyCtx;
  if (!ctx) return;
  const { mob, elapsedMs, mobData } = ctx;
  const store = loadS();

  let kills = 0, bestRate = 0, bestCount = 0;
  mob.drops.forEach(d => {
    const cnt = mobData[d.id]?.count || 0;
    const rate = parseFloat(d.rate) / 100;
    if (cnt > 0 && rate > 0 && rate > bestRate) { bestRate = rate; bestCount = cnt; }
  });
  if (bestRate > 0) kills = Math.round(bestCount / bestRate);

  const completed = (store.completed || []).filter(c => c.mobId !== mob.id);
  completed.push({
    mobId:   mob.id,
    mobName: mob.name,
    level:   mob.level || 0,
    elapsed: elapsedMs,
    kills,
    date:    new Date().toISOString().slice(0, 10),
    drops:   mob.drops,
    mobData: { ...mobData },
  });
  store.completed = completed;
  if (store[`mob_${mob.id}`]) store[`mob_${mob.id}`].completionSaved = true;
  saveS(store);
  renderTrophy();

  const btn = document.getElementById('result-btn-trophy');
  if (btn) { btn.disabled = true; btn.textContent = '✓ 저장됨'; }
}

function saveCompletion(mob, elapsedMs) {
  const store = loadS();
  if (store[`mob_${mob.id}`]?.completionSaved) return;
  const mobData = store[`mob_${mob.id}`] || {};
  const excl = new Set(store[`excl_${mob.id}`] || []);
  const drops = mob.drops.filter(d => !excl.has(d.id));

  let kills = 0, bestRate = 0, bestCount = 0;
  drops.forEach(d => {
    const cnt = mobData[d.id]?.count || 0;
    const rate = parseFloat(d.rate) / 100;
    if (cnt > 0 && rate > 0 && rate > bestRate) { bestRate = rate; bestCount = cnt; }
  });
  if (bestRate > 0) kills = Math.round(bestCount / bestRate);

  // mobId 기준 중복 제거 후 추가
  const completed = (store.completed || []).filter(c => c.mobId !== mob.id);
  completed.push({
    mobId:   mob.id,
    mobName: mob.name,
    elapsed: elapsedMs,
    kills,
    date:    new Date().toISOString().slice(0, 10),
    drops:   mob.drops,
    mobData: { ...mobData },
  });
  store.completed = completed;
  store[`mob_${mob.id}`] = { ...mobData, completionSaved: true };
  saveS(store);
  renderTrophy();
}

function renderTrophy() {
  const store = loadS();
  // mobId 기준 dedup (마지막 항목 우선)
  const seen = new Set();
  const completed = (store.completed || []).slice().reverse().filter(c => {
    if (seen.has(c.mobId)) return false;
    seen.add(c.mobId); return true;
  });

  const btn = document.getElementById('trophy-open-btn');
  const btnTitle = document.getElementById('trophy-btn-title');
  const btnSub = document.getElementById('trophy-btn-sub');
  if (btnTitle) btnTitle.textContent = `진열장 열기`;
  if (btnSub) btnSub.textContent = completed.length ? `${completed.length}마리 완료` : '완료한 도감작이 없습니다';
  if (btn) btn.style.opacity = completed.length ? '1' : '0.5';
}

let _trophySort = { key: 'date', dir: -1 }; // -1=내림차순(최신/오래/높은), 1=오름차순

function setTrophySort(key) {
  if (_trophySort.key === key) {
    _trophySort.dir *= -1;
  } else {
    _trophySort = { key, dir: -1 };
  }
  renderTrophyGrid();
  // 버튼 스타일 업데이트
  ['date','elapsed','kills'/* ,'level' */].forEach(k => {
    const btn = document.getElementById(`tsort-${k}`);
    const arrow = document.getElementById(`tsort-${k}-arrow`);
    if (!btn || !arrow) return;
    btn.classList.toggle('active', _trophySort.key === k);
    arrow.textContent = (_trophySort.key === k && _trophySort.dir === 1) ? '↑' : '↓';
  });
}

function getTrophyCompleted() {
  const store = loadS();
  const seen = new Set();
  return (store.completed || []).slice().reverse().filter(c => {
    if (seen.has(c.mobId)) return false;
    seen.add(c.mobId); return true;
  });
}

function fmtAvgElapsed(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h > 0 && m > 0) return `${h}시간 ${m}분`;
  if (h > 0) return `${h}시간`;
  return m > 0 ? `${m}분` : '-';
}

function updateTrophyStats(completed, store) {
  const cEl = document.getElementById('tstat-count');
  const kEl = document.getElementById('tstat-kills');
  const aEl = document.getElementById('tstat-avg');
  if (!cEl) return;
  const count = completed.length;
  const totalKills = completed.reduce((s, c) => s + _calcTrophyKills(c, store), 0);
  const withTime = completed.filter(c => c.elapsed > 0);
  const avgMs = withTime.length ? withTime.reduce((s, c) => s + c.elapsed, 0) / withTime.length : 0;
  cEl.textContent = count || '-';
  kEl.textContent = totalKills > 0 ? totalKills.toLocaleString() : '-';
  aEl.textContent = avgMs > 0 ? fmtAvgElapsed(avgMs) : '-';
}

function _calcTrophyKills(c, store) {
  const mobData = c.mobData || {};
  const excl    = new Set((store[`excl_${c.mobId}`] || []));
  const drops   = (c.drops || []).filter(d => !excl.has(d.id));
  const tlBase  = store[`tl_base_${c.mobId}`];
  if (tlBase) {
    const bd = (c.drops || []).find(d => d.id === tlBase.id);
    if (bd) {
      const cnt = mobData[bd.id]?.count || 0;
      const rate = parseFloat(bd.rate) / 100;
      if (cnt > 0 && rate > 0) return Math.round(cnt / rate);
    }
  }
  let bestRate = 0, bestCount = 0;
  drops.forEach(d => {
    const cnt = mobData[d.id]?.count || 0;
    const rate = parseFloat(d.rate) / 100;
    if (cnt > 0 && rate > 0 && rate > bestRate) { bestRate = rate; bestCount = cnt; }
  });
  return bestRate > 0 ? Math.round(bestCount / bestRate) : 0;
}

function renderTrophyGrid() {
  const completed = getTrophyCompleted();
  const store = loadS();
  const { key, dir } = _trophySort;
  const sorted = completed.slice().sort((a, b) => {
    let av, bv;
    if (key === 'date')    { av = a.date || ''; bv = b.date || ''; }
    if (key === 'elapsed') { av = a.elapsed || 0; bv = b.elapsed || 0; }
    if (key === 'kills')   { av = _calcTrophyKills(a, store); bv = _calcTrophyKills(b, store); }
    return av < bv ? -dir : av > bv ? dir : 0;
  });

  const grid = document.getElementById('trophy-grid');
  if (!grid) return;
  if (!sorted.length) {
    updateTrophyStats([], store);
    grid.innerHTML = '<div style="color:rgba(200,168,107,.5);font-size:.8rem;padding:20px;text-align:center">아직 완료한 도감작이 없습니다</div>';
    return;
  }
  updateTrophyStats(completed, store);
  grid.innerHTML = sorted.map(c => {
    const yymm = c.date ? c.date.slice(2, 7).replace('-', '.') : '';
    const timeStr = c.elapsed ? fmtTime(c.elapsed).replace(/\.\d+$/, '') : '-';
    const kills   = _calcTrophyKills(c, store);
    const killPart = kills > 0 ? ` &nbsp;·&nbsp; 🗡 ${kills.toLocaleString()}마리` : '';
    const lv = c.level || PRESET.find(p => p.id === c.mobId)?.level || 0;
    return `<div class="trophy-card" onclick="openTrophyModal(${c.mobId})">
      <button class="trophy-del" onclick="event.stopPropagation();deleteTrophy(${c.mobId})">✕</button>
      <div class="trophy-portrait">
        <img src="https://maplestory.io/api/kms/284/mob/${c.mobId}/icon"
             onerror="this.src='https://maplestory.io/api/gms/62/mob/${c.mobId}/icon'"
             alt="${escHtml(c.mobName)}">
      </div>
      <div class="trophy-sep"></div>
      <div class="trophy-info">
        <div class="trophy-name">${escHtml(c.mobName)}</div>
        <div class="trophy-stats">⏱ ${timeStr}${killPart}</div>
        <div class="trophy-date-badge">${yymm}</div>
      </div>
    </div>`;
  }).join('');
}

function openTrophyRoom() {
  const completed = getTrophyCompleted();
  const sub = document.getElementById('trophy-modal-sub');
  if (sub) sub.textContent = `총 ${completed.length}마리 완료`;

let _pendingDeleteMobId = null;

function deleteTrophy(mobId) {
  const store = loadS();
  const c = (store.completed || []).find(x => x.mobId === mobId);
  if (!c) return;
  _pendingDeleteMobId = mobId;
  const nameEl = document.getElementById('del-confirm-mob-name');
  if (nameEl) nameEl.textContent = `"${c.mobName}"`;
  document.getElementById('del-confirm-overlay').classList.add('open');
}

function closeDelConfirm() {
  _pendingDeleteMobId = null;
  document.getElementById('del-confirm-overlay').classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('del-confirm-overlay')?.classList.contains('open')) {
      closeDelConfirm();
    }
  }
});

function confirmDeleteTrophy() {
  const mobId = _pendingDeleteMobId;
  closeDelConfirm();
  if (!mobId) return;
  const store = loadS();
  store.completed = (store.completed || []).filter(x => x.mobId !== mobId);

}

function closeTrophyRoom(e) {

  document.getElementById('trophy-overlay').classList.remove('open');
}

function openTrophyModal(mobId) {
  const store = loadS();
  const seen = new Set();
  const completed = (store.completed || []).slice().reverse().filter(c => {
    if (seen.has(c.mobId)) return false;
    seen.add(c.mobId); return true;
  });
  const c = completed.find(x => x.mobId === mobId);
  if (!c) return;

  // drops: 저장된 스냅샷 → 활성 탭 mob → 프리셋 순으로 fallback
  const activeTabMob = tabs.find(t => t.mob?.id === mobId)?.mob;
  const drops = (c.drops && c.drops.length) ? c.drops
    : activeTabMob?.drops
    || PRESET.find(p => p.id === mobId)?.drops
    || [];
  const mob = { id: c.mobId, name: c.mobName, level: 0, drops };

  // mobData: 스냅샷(completionSaved 외 키 있을 때) → 현재 store 데이터 → 활성 탭 store 데이터
  const hasSnap = c.mobData && Object.keys(c.mobData).some(k => k !== 'completionSaved');
  const mobData = hasSnap ? c.mobData : (store[`mob_${mobId}`] || {});

  const fakeStore = { ...store, [`mob_${mobId}`]: mobData };
  const fakeTab = { sw: { base: c.elapsed || 0, startTs: null } };
  openResultModal(mob, fakeTab, fakeStore);
}

// ══════════════════════════════════════════
// 18. 도감작 결과 카드

function rarityColor(rateStr) {
  const r = parseFloat(rateStr);
  if (isNaN(r)) return { bg:'rgba(155,89,182,.25)', fg:'#ce93d8' };
  if (r >= 1)     return { bg:'rgba(52,152,219,.25)',  fg:'#7ec8e3' };
  if (r >= 0.1)   return { bg:'rgba(46,204,113,.22)',  fg:'#7ddfab' };
  if (r >= 0.01)  return { bg:'rgba(241,196,15,.22)',  fg:'#f9e14b' };
  if (r >= 0.007) return { bg:'rgba(230,126,34,.22)',  fg:'#f5a55a' };
  if (r >= 0.005) return { bg:'rgba(231,76,60,.22)',   fg:'#f08080' };
  return                  { bg:'rgba(155,89,182,.25)', fg:'#ce93d8' };
}
function rarityBorderColor(rateStr) {
  const r = parseFloat(rateStr);
  if (isNaN(r)) return '#9b59b6';
  if (r >= 1)     return '#3498db';
  if (r >= 0.1)   return '#2ecc71';
  if (r >= 0.01)  return '#f1c40f';
  if (r >= 0.007) return '#e67e22';
  if (r >= 0.005) return '#e74c3c';
  return '#9b59b6';
}

function openResultModal(mob, _overrideTab, _overrideStore) {
  mob = mob || activeMob;
  if (!mob) return;
  const s        = _overrideStore || loadS();
  const mobData  = s[`mob_${mob.id}`] || {};
  const excl     = new Set(s[`excl_${mob.id}`] || []);
  const tlBaseId = s[`tl_base_${mob.id}`]?.id;
  const tab      = _overrideTab || tabs.find(t => t.mob?.id === mob.id) || activeTab();
  const elapsedMs = swElapsed(tab);

  // 진척도
  const drops    = mob.drops.filter(d => !excl.has(d.id) && d.id !== tlBaseId);
  const total    = drops.length;
  const done     = drops.filter(d => (mobData[d.id]?.count || 0) > 0).length;
  const pct      = total ? Math.round(done / total * 100) : 0;

  // 예상마릿수
  let huntHtml = '—';
  const huntStore = s[`tl_base_${mob.id}`];
  if (huntStore) {
    const bd = mob.drops.find(d => d.id === huntStore.id);
    if (bd) {
      const cnt  = mobData[bd.id]?.count || 0;
      const rate = parseFloat(bd.rate) / 100;
      if (cnt > 0 && rate > 0) huntHtml = `${Math.round(cnt / rate).toLocaleString()}마리`;
    }
  } else {
    let bestRate = 0, bestDrop = null, bestCount = 0;
    drops.forEach(d => {
      const cnt  = mobData[d.id]?.count || 0;
      const rate = parseFloat(d.rate) / 100;
      if (cnt > 0 && rate > 0 && rate > bestRate) { bestRate = rate; bestDrop = d; bestCount = cnt; }
    });
    if (bestDrop) huntHtml = `${Math.round(bestCount / bestRate).toLocaleString()}마리`;
  }

  // 아이템 그리드 (제외 아이템 제외, 5열)
  const visDrops = mob.drops.filter(d => !excl.has(d.id));
  const itemCells = visDrops.map(d => {
    const cnt      = mobData[d.id]?.count || 0;
    const found    = cnt > 0;
    const border   = found ? rarityBorderColor(d.rate) : 'rgba(80,80,80,.5)';
    const cls      = found ? 'ri-cell ri-found' : 'ri-cell ri-nf';
    const timeLabel = (found && mobData[d.id]?.firstTime != null) ? `첫 출현 ${fmtTimeLog(mobData[d.id].firstTime)}` : '';
    const rc       = rarityColor(d.rate);
    const rateRaw  = d.rate != null ? String(d.rate).replace(/%/g, '') : '?';
    const rateDisp = rateRaw === '?' ? '?' : rateRaw + '%';
    const glowStyle = found ? `border-color:${border};--ri-color:${border}80` : '';
    return `<div class="${cls}" style="${glowStyle}">
      <img src="${itemImg(d.id)}" alt="${escHtml(d.name)}" onerror="onItemImgError(this,${d.id})">
      ${found ? `<span class="ri-cnt">×${cnt}</span>` : ''}
      <span class="ri-rate" style="background:${rc.bg};color:${rc.fg}">${escHtml(rateDisp)}</span>
      <div class="ri-tooltip">${escHtml(d.name)}<br>${found ? cnt+'개 수집' : '미획득'}${timeLabel ? '<br>'+timeLabel : ''}</div>
    </div>`;
  }).join('');

  const card = document.getElementById('result-card-export');
  const isComplete = done === total && total > 0;
  const timeStr = fmtTime(elapsedMs).replace(/\.\d+$/, '');
  card.className = `result-card${isComplete ? ' complete' : ''}`;
  card.innerHTML = `
    ${isComplete ? '<div class="gold-shimmer"></div>' : ''}<div class="mouse-glow"></div>
    <div class="result-hero">
      <div class="result-hero-left">
        <div class="result-mob-img-wrap">
          <img class="result-mob-img" src="${mobImg(mob.id)}" alt="${escHtml(mob.name)}" onerror="this.src='${BLANK}'">
        </div>
        <div class="result-mob-name">${escHtml(mob.name)}</div>
      </div>
      <div class="result-hero-right">
        <div class="result-hero-stats">
          <div class="result-stat-block">
            <span class="rsb-label">소요 시간</span>
            <span class="rsb-value">${timeStr}</span>
          </div>
          <div class="result-stat-block">
            <span class="rsb-label">예상 사냥 횟수</span>
            <span class="rsb-value">${huntHtml}</span>
          </div>
          <div class="result-stat-block full">
            <span class="rsb-label">진척도</span>
            <span class="rsb-value small">${done}/${total} (${pct}%)</span>
          </div>
        </div>
      </div>
    </div>
    <div class="result-divider"></div>
    <div>
      <div class="result-section-title">획득 아이템</div>
      <div class="result-items-grid" style="grid-template-columns:repeat(${mob.drops.length > 28 ? 7 : mob.drops.length > 20 ? 6 : 5},1fr)">${itemCells}</div>
    </div>
  `;

  document.getElementById('result-overlay').style.display = 'flex';

  // 진열장 저장 버튼
  const trophyBtn = document.getElementById('result-btn-trophy');
  if (trophyBtn) {
    const fromTrophy = !!_overrideStore;
    if (fromTrophy || !isComplete) {
      trophyBtn.style.display = 'none';
    } else {
      const alreadySaved = !!(loadS()[`mob_${mob.id}`]?.completionSaved);
      trophyBtn.style.display = '';
      trophyBtn.disabled = alreadySaved;
      trophyBtn.textContent = alreadySaved ? '✓ 저장됨' : '🏅 진열장에 저장';
      window._trophyCtx = { mob, elapsedMs, mobData: { ...mobData } };
    }
  }

  // 마우스 반응형 홀로그래픽 shimmer
  let _tiltRaf = null;
  card._onMouseMove = function(e) {
    if (_tiltRaf) { cancelAnimationFrame(_tiltRaf); _tiltRaf = null; }
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)));
    card.style.setProperty('--my', Math.min(1, Math.max(0, (e.clientY - r.top) / r.height)));
    card.classList.add('tilt');
  };
  card._onMouseLeave = function() {
    if (_tiltRaf) cancelAnimationFrame(_tiltRaf);
    const startMx = parseFloat(card.style.getPropertyValue('--mx') || '0.5');
    const startMy = parseFloat(card.style.getPropertyValue('--my') || '0.5');
    const dur = 620;
    const t0 = performance.now();
    function easeOut(t) { return 1 - (1 - t) * (1 - t) * (1 - t); }
    function step(now) {
      const p = Math.min(1, (now - t0) / dur);
      const e = easeOut(p);
      card.style.setProperty('--mx', startMx + (0.5 - startMx) * e);
      card.style.setProperty('--my', startMy + (0.5 - startMy) * e);
      if (p < 1) { _tiltRaf = requestAnimationFrame(step); }
      else { card.classList.remove('tilt'); _tiltRaf = null; }
    }
    _tiltRaf = requestAnimationFrame(step);
  };
  card.removeEventListener('mousemove', card._onMouseMove);
  card.removeEventListener('mouseleave', card._onMouseLeave);
  card.addEventListener('mousemove', card._onMouseMove);
  card.addEventListener('mouseleave', card._onMouseLeave);

  // 관리자 패널
  const modal = document.getElementById('result-modal-inner');
  const adminPanel = document.getElementById('admin-time-panel');
  if (adminPanel) {
    if (window._adminMode) {
      modal.appendChild(adminPanel);
      adminPanel.style.display = 'block';
      if (typeof _adminFillCurrent === 'function') _adminFillCurrent();
    } else {
      adminPanel.style.display = 'none';
    }
  }
}

function exportResultImage() {
  const target = document.getElementById('result-card-export');
  const btn    = document.querySelector('.result-btn-save');
  btn.textContent = '준비 중...'; btn.disabled = true;

  const imgs = [...target.querySelectorAll('img')];
  const origSrcs = imgs.map(i => i.src);

  function fetchDataUrl(url) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 4000);
    return fetch(url, { signal: ctrl.signal })
      .then(r => { clearTimeout(timer); if (!r.ok) throw new Error(); return r.blob(); })
      .catch(e => { clearTimeout(timer); throw e; })
      .then(blob => new Promise(res => {
        const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(blob);
      }));
  }
  function toDataUrl(url) {
    if (url.startsWith('data:')) return Promise.resolve(url);
    const fallback = url.includes('/api/kms/284/')
      ? url.replace('/api/kms/284/', '/api/gms/62/')
      : null;
    return fetchDataUrl(url)
      .catch(() => fallback ? fetchDataUrl(fallback) : Promise.reject())
      .catch(() => null);
  }

  const cleanup = () => {
    imgs.forEach((img, i) => img.src = origSrcs[i]);
    target.querySelectorAll('.ri-tooltip').forEach(t => t.style.display = '');
    target.style.removeProperty('transform');
    target.style.removeProperty('padding-bottom');
    btn.textContent = '이미지 저장'; btn.disabled = false;
  };

  Promise.all(imgs.map(img => toDataUrl(img.src)))
    .then(dataUrls => {
      dataUrls.forEach((du, i) => { if (du) imgs[i].src = du; });
      return Promise.all(imgs.map(img =>
        img.complete ? Promise.resolve() :
        new Promise(res => { img.onload = res; img.onerror = res; })
      ));
    })
    .then(() => {
      target.querySelectorAll('.ri-tooltip').forEach(t => t.style.display = 'none');
      target.classList.remove('tilt');
      target.style.setProperty('--mx', '0.5');
      target.style.setProperty('--my', '0.5');
      target.style.transform = 'perspective(700px) rotateX(0deg) rotateY(0deg)';
      target.style.paddingBottom = (parseInt(getComputedStyle(target).paddingBottom) + 16) + 'px';
      return new Promise(r => setTimeout(r, 80));
    })
    .then(() => {
      const rect = target.getBoundingClientRect();
      return domtoimage.toPng(target, { scale: 2, height: Math.ceil(rect.height), width: Math.ceil(rect.width) });
    })
    .then(dataUrl => {
      cleanup();
      const a = document.createElement('a');
      a.download = `도감작_${activeMob?.name || 'result'}_${Date.now()}.png`;
      a.href = dataUrl;
      a.click();
    })
    .catch(() => { cleanup(); alert('이미지 저장 실패. 브라우저 설정을 확인해주세요.'); });
}

<script>
// ── 관리자 히든 버튼 ──
let _verClickCount = 0, _verClickTimer = null;
document.getElementById('ver-label').addEventListener('click', () => {
  _verClickCount++;
  clearTimeout(_verClickTimer);
  _verClickTimer = setTimeout(() => { _verClickCount = 0; }, 2500);
  if (_verClickCount >= 5) {
    _verClickCount = 0;
    window._adminMode = !window._adminMode;
    const panel = document.getElementById('admin-time-panel');
    const overlay = document.getElementById('result-overlay');
    if (window._adminMode && overlay.style.display !== 'none') {
      panel.style.display = 'block';
      _adminFillCurrent();
    } else {
      panel.style.display = 'none';
    }
  }
});

function _adminFillCurrent() {
  const tab = activeTab();
  if (!tab?.mob) return;
  const ms = swElapsed(tab);
  document.getElementById('admin-h').value = Math.floor(ms / 3600000);
  document.getElementById('admin-m').value = Math.floor((ms % 3600000) / 60000);
  document.getElementById('admin-s').value = Math.floor((ms % 60000) / 1000);
}

function adminApplyTime() {
  const tab = activeTab();
  if (!tab?.mob) return;
  const h = parseInt(document.getElementById('admin-h').value) || 0;
  const m = parseInt(document.getElementById('admin-m').value) || 0;
  const s = parseInt(document.getElementById('admin-s').value) || 0;
  const newMs = (h * 3600 + m * 60 + s) * 1000;
  // 실행 중이면 일시정지 후 base 교체 (UI 버튼 상태도 갱신)
  if (tab.sw.startTs !== null) _swPauseOne(tab, getActivePanel());
  tab.sw.base = newMs;
  const store = loadS();
  store[`sw_mob_${tab.mob.id}`] = { base: newMs };
  saveS(store);
  // 모달 새로고침
  openResultModal(tab.mob);
}

// ── Floating Widget ──
let _fwCollapsed = false;

function fwCollapseToggle() {
  _fwCollapsed = !_fwCollapsed;
  document.getElementById('fw-body').style.display = _fwCollapsed ? 'none' : '';
  document.getElementById('fw-collapse-btn').textContent = _fwCollapsed ? '▸' : '▾';
}

function _fwCalcKills(tab, store) {
  if (!tab.mob) return { kills: 0, refDrop: null };
  const mobData = store[`mob_${tab.mob.id}`] || {};
  const excl    = new Set(store[`excl_${tab.mob.id}`] || []);
  const tlBase  = store[`tl_base_${tab.mob.id}`] || null;
  let bestRate = 0, bestCount = 0, refDrop = null;
  if (tlBase) {
    const d = tab.mob.drops.find(x => x.id === tlBase.id);
    if (d) { const c = mobData[d.id]?.count||0, r = parseFloat(d.rate)/100; if(c>0&&r>0){bestCount=c;bestRate=r;refDrop=d;} }
  } else {
    tab.mob.drops.forEach(d => {
      if (excl.has(d.id)) return;
      const c = mobData[d.id]?.count||0; if (!c) return;
      const r = parseFloat(d.rate)/100; if (!r) return;
      if (r > bestRate) { bestRate=r; bestCount=c; refDrop=d; }
    });
  }
  return { kills: bestRate > 0 ? Math.round(bestCount/bestRate) : 0, refDrop };
}

function fwUpdate() {
  const tab    = activeTab();
  const timeEl = document.getElementById('fw-time');
  if (!timeEl) return;

  const ms = swElapsed(tab);
  const h = Math.floor(ms/3600000), mi = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  timeEl.textContent = `${pad(h)}:${pad(mi)}:${pad(s)}`;
  document.getElementById('fw-mob').textContent = tab.mob ? tab.mob.name : '-';

  const running = tab.sw.startTs !== null;
  const swBtn = document.getElementById('fw-sw-btn');
  if (swBtn) {
    swBtn.textContent = running ? '⏸ 일시정지' : '▶ 시작';
    swBtn.className   = 'fw-action-btn' + (running ? ' fw-sw-pause' : '');
    swBtn.id = 'fw-sw-btn';
  }

  if (_fwCollapsed) return;

  const store = loadS();
  const { kills, refDrop } = _fwCalcKills(tab, store);
  const killsEl = document.getElementById('fw-kills');
  if (kills > 0 && refDrop) {
    killsEl.innerHTML = `🗡 ${kills.toLocaleString()} 마리 <span style="color:rgba(200,168,107,.45);font-size:.55rem">⚑ ${refDrop.name}</span>`;
  } else {
    killsEl.textContent = '🗡 -';
  }

  const itemsEl = document.getElementById('fw-items');
  if (!itemsEl) return;
  if (!tab.mob) { itemsEl.innerHTML = ''; return; }
  const mobData  = store[`mob_${tab.mob.id}`] || {};
  const excl     = new Set(store[`excl_${tab.mob.id}`] || []);
  const tlBaseId = store[`tl_base_${tab.mob.id}`]?.id;
  const drops    = tab.mob.drops.filter(d => !excl.has(d.id) && d.id !== tlBaseId);
  const newHtml  = drops.map(d => {
    const cnt = mobData[d.id]?.count || 0;
    return `<button class="fw-item-btn${cnt>0?' fw-item-done':''}" onclick="incrementItem(${d.id})" title="${d.name}"><img src="${itemImg(d.id)}" onerror="this.src='${BLANK}'" style="width:26px;height:26px;object-fit:contain;image-rendering:pixelated">${cnt>0?`<span class="fw-item-cnt">${cnt}</span>`:''}</button>`;
  }).join('');
  if (itemsEl.innerHTML !== newHtml) itemsEl.innerHTML = newHtml;
}

// 드래그 (top/left만 사용, right/bottom 초기값은 HTML 인라인에만)
(function() {
  let drag = null;
  const fw = document.getElementById('fw');
  document.getElementById('fw-header').addEventListener('mousedown', e => {
    if (e.target.classList.contains('fw-hdr-btn')) return;
    const r = fw.getBoundingClientRect();
    fw.style.right=''; fw.style.bottom='';
    fw.style.left=r.left+'px'; fw.style.top=r.top+'px';
    drag = { ox: e.clientX-r.left, oy: e.clientY-r.top };
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    fw.style.left=(e.clientX-drag.ox)+'px';
    fw.style.top=(e.clientY-drag.oy)+'px';
  });
  document.addEventListener('mouseup', () => { drag=null; });
})();

// ── 오버레이 팝업 (localStorage 기반 동기화) ──
const OL_STATE = 'maple_overlay_state';
const OL_CMD   = 'maple_overlay_cmd';
let _overlayWin = null;

function openOverlay() {
  if (_overlayWin && !_overlayWin.closed) { _overlayWin.focus(); return; }
  _overlayWin = window.open('', 'maple-overlay',
    'width=300,height=250,resizable=yes,toolbar=no,menubar=no,scrollbars=no,location=no,status=no');
  if (!_overlayWin) { alert('팝업이 차단되었습니다. 브라우저에서 팝업을 허용해 주세요.'); return; }
  _overlayWin.document.write(_overlayHTML());
  _overlayWin.document.close();
}

function _olWriteState() {
  if (!_overlayWin || _overlayWin.closed) return;
  const tab = activeTab();
  const store = loadS();
  const { kills, refDrop } = _fwCalcKills(tab, store);
  localStorage.setItem(OL_STATE, JSON.stringify({
    mobId:       tab.mob?.id    || null,
    mobName:     tab.mob?.name  || '-',
    elapsed:     swElapsed(tab),
    isRunning:   tab.sw.startTs !== null,
    kills,
    refDropName: refDrop?.name || '',
    refItemId:   refDrop?.id   || null,
    ts:          Date.now()
  }));
}

function _olReadCmd() {
  const raw = localStorage.getItem(OL_CMD);
  if (!raw) return;
  localStorage.removeItem(OL_CMD);
  try {
    const cmd = JSON.parse(raw);
    if (cmd.type === 'toggle') swToggle();
    else if (cmd.type === 'ch')  swChannelMark();
    else if (cmd.type === 'inc' && cmd.itemId) incrementItem(cmd.itemId);
  } catch(e) {}
}

function _overlayHTML() {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>도감작 오버레이</title>
<style>

body{background:#1a1a2e;color:#e8c97a;font-family:sans-serif;width:300px;height:250px;display:flex;flex-direction:column;overflow:hidden;user-select:none}

#ol-mob{font-size:.72rem;color:rgba(200,168,107,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#ol-inc{padding:3px 11px;border:1px solid rgba(200,146,42,.4);border-radius:5px;background:rgba(200,146,42,.1);color:#e8c97a;font-size:.65rem;font-weight:700;cursor:pointer}

.ob{flex:1;padding:9px 4px;border:none;border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:sans-serif}
#ob-sw{background:#4caf50;color:#fff}
#ob-sw.pause{background:#f5a623}
#ob-ch{background:rgba(232,244,253,.08);color:#7ec8f0;border:1px solid rgba(168,212,240,.18)}
#ol-off{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);align-items:center;justify-content:center;flex-direction:column;gap:6px}
#ol-off.show{display:flex}
</style></head><body>
<div id="ol-hd"><img id="ol-img" src="" onerror="this.style.display='none'"><span id="ol-mob">-</span></div>
<div id="ol-time">--:--:--</div>
<div id="ol-kills"><span id="ol-kills-txt">🗡 -</span><button id="ol-inc" disabled onclick="cmd('inc')">+1</button></div>
<div id="ol-btns">
  <button class="ob" id="ob-sw" onclick="cmd('toggle')">▶ 시작</button>
  <button class="ob" id="ob-ch" onclick="cmd('ch')">📡 채널변경</button>
</div>
<div id="ol-off"><div style="font-size:1.4rem">⚠️</div><div style="font-size:.75rem;color:#f5a623">메인 창이 닫혔습니다</div></div>
<script>
const OL_STATE='maple_overlay_state', OL_CMD='maple_overlay_cmd';
let _rid=null;
function cmd(type){const c={type,ts:Date.now()};if(type==='inc'&&_rid)c.itemId=_rid;localStorage.setItem(OL_CMD,JSON.stringify(c));}
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const raw=localStorage.getItem(OL_STATE);
  const off=document.getElementById('ol-off');
  if(!raw){off.classList.add('show');return;}
  try{
    const s=JSON.parse(raw);
    if(Date.now()-s.ts>3000){off.classList.add('show');return;}
    off.classList.remove('show');
    const ms=s.elapsed,h=Math.floor(ms/3600000),mi=Math.floor((ms%3600000)/60000),sc=Math.floor((ms%60000)/1000);
    document.getElementById('ol-time').textContent=pad(h)+':'+pad(mi)+':'+pad(sc);
    document.getElementById('ol-mob').textContent=s.mobName||'-';
    const img=document.getElementById('ol-img');
    if(s.mobId){img.style.display='';img.src='https://maplestory.io/api/kms/284/mob/'+s.mobId+'/icon';}
    else{img.style.display='none';}
    _rid=s.refItemId||null;
    document.getElementById('ol-kills-txt').textContent=s.kills>0?'🗡 '+s.kills.toLocaleString()+' 마리'+(s.refDropName?' ⚑ '+s.refDropName:''):'🗡 -';
    document.getElementById('ol-inc').disabled=!_rid;
    const sw=document.getElementById('ob-sw');
    sw.textContent=s.isRunning?'⏸ 일시정지':'▶ 시작';
    sw.className='ob'+(s.isRunning?' pause':'');
    sw.id='ob-sw';
  }catch(e){}
}
setInterval(tick,200);
window.addEventListener('beforeunload',()=>localStorage.removeItem(OL_CMD));
<\/script></body></html>`;
}

setInterval(() => { fwUpdate(); _olWriteState(); _olReadCmd(); }, 150);

window.addEventListener('beforeunload', () => {
  if (_overlayWin && !_overlayWin.closed) _overlayWin.close();
  localStorage.removeItem(OL_STATE);
  localStorage.removeItem(OL_CMD);
});
</script>
</body>
