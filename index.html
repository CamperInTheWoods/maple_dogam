<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이플랜드 도감작 체크리스트</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='80'>🍁</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    :root {
      --brown:  #7a4a1e;
      --gold:   #f5a623;
      --green:  #4caf50;
      --red:    #e53935;
      --gray:   #9e9e9e;
      --dark:   #3e2a10;
      --panel:  #fffbf0;
      --border: #c8a86b;
      --shadow: rgba(122,74,30,.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #2c1a0e url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      min-height: 100vh;
      color: var(--dark);
    }

    /* ─ Header ─ */
    header {
      background: linear-gradient(135deg,#5c3310,#8b5e3c,#5c3310);
      border-bottom: 3px solid var(--gold);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { color: var(--gold); font-size:1.4rem; font-weight:700; text-shadow:1px 1px 3px rgba(0,0,0,.6); }
    header .sub { color:#d4b483; font-size:.75rem; margin-top:2px; }
    .char-status { margin-left:auto; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .overlay-open-btn { background:rgba(245,166,35,.12); border:1px solid rgba(245,166,35,.35); color:rgba(245,166,35,.8); font-size:.58rem; padding:3px 9px; border-radius:6px; cursor:pointer; font-family:inherit; transition:all .15s; }
    .overlay-open-btn:hover { background:rgba(245,166,35,.22); color:var(--gold); }
    .char-label { font-size:.58rem; color:#e8c97a; letter-spacing:.03em; text-shadow:0 1px 3px rgba(0,0,0,.7); font-weight:600; }
    .char-mobs { display:flex; gap:8px; align-items:center; }
    .char-mob-img { width:40px; height:40px; object-fit:contain; image-rendering:pixelated; border:2px solid var(--gold); border-radius:8px; background:rgba(0,0,0,.25); padding:2px; box-shadow:0 0 6px rgba(245,166,35,.4); transition:transform .15s,box-shadow .15s; }
    .char-mob-img:hover { transform:scale(1.12); box-shadow:0 0 10px rgba(245,166,35,.7); }

    /* ─ Layout ─ */
    .container { max-width:980px; margin:0 auto; padding:20px 16px; }

    .panel {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 16px var(--shadow);
      margin-bottom: 16px;
    }
    .ptitle {
      font-size:.7rem; font-weight:700; color:var(--brown);
      text-transform:uppercase; letter-spacing:1px;
      margin-bottom:10px;
      display:flex; align-items:center; gap:6px;
    }
    .ptitle::before {
      content:''; display:inline-block;
      width:3px; height:13px; background:var(--gold); border-radius:2px;
    }

    /* ─ Search ─ */
    .search-row { display:flex; gap:8px; }
    .search-row input, .id-row input {
      flex:1; padding:9px 14px;
      border:2px solid var(--border); border-radius:8px;
      font-family:inherit; font-size:.85rem; background:white; color:var(--dark);
      outline:none; transition:border-color .15s;
    }
    .search-row input:focus, .id-row input:focus { border-color:var(--gold); }
    .search-row input::placeholder, .id-row input::placeholder { color:var(--gray); }
    .id-row { display:flex; gap:8px; margin-top:8px; }
    .backup-inline { position:absolute; right:0; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:5px; }
    .backup-toggle-btn { font-size:.6rem; padding:2px 7px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--gray); font-family:inherit; cursor:pointer; transition:all .15s; }
    .backup-toggle-btn:hover { border-color:var(--gold); color:var(--brown); }
    .backup-toggle-btn.open { border-color:rgba(210,140,20,.7); color:#7a4500; background:rgba(220,155,15,.14); }
    .backup-inline-btns { display:none; gap:4px; }
    .backup-inline-btns.open { display:flex; }
    .backup-inline-btns button { font-size:.6rem; padding:2px 7px; border-radius:5px; border:1px solid var(--border); background:#fdf6e8; color:var(--brown); font-family:inherit; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .backup-inline-btns button:hover { border-color:var(--gold); background:#f5e8c8; }
    .id-section { overflow:hidden; transition:max-height .3s ease, opacity .3s ease; }
    .id-section.collapsed { max-height:0; opacity:0; pointer-events:none; }
    .id-section.expanded  { max-height:80px; opacity:1; }
    .ptitle-toggle { display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
    .ptitle-toggle .toggle-arrow { font-size:.75rem; color:var(--gray); transition:transform .3s; }
    .ptitle-toggle.collapsed .toggle-arrow { transform:rotate(-90deg); }

    .btn {
      padding:8px 18px;
      background:linear-gradient(135deg,#f5a623,#e08800);
      border:none; border-radius:8px;
      color:white; font-family:inherit; font-size:.85rem; font-weight:700;
      cursor:pointer; transition:all .15s;
      text-shadow:0 1px 2px rgba(0,0,0,.3);
      box-shadow:0 2px 6px rgba(245,166,35,.4);
      white-space:nowrap;
    }
    .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn.danger { background:linear-gradient(135deg,#e53935,#b71c1c); box-shadow:0 2px 6px rgba(229,57,53,.4); }
    .btn.sm { padding:5px 12px; font-size:.75rem; }

    .msg { font-size:.75rem; color:var(--gray); margin-top:6px; min-height:16px; display:flex; align-items:center; gap:5px; }
    .msg.err  { color:var(--red); }
    .msg-icon { display:inline-flex; width:14px; height:14px; border-radius:50%; align-items:center; justify-content:center; flex-shrink:0; }
    .msg.loading .msg-icon {
      border:2px solid rgba(200,146,42,.25); border-top-color:rgba(245,166,35,.85);
      animation:msgSpin .65s linear infinite;
    }
    .msg.done .msg-icon {
      background:rgba(76,175,80,.15); border:1.5px solid rgba(76,175,80,.5);
      color:#4caf50; font-size:.55rem; font-weight:900;
    }
    .msg.err .msg-icon {
      background:rgba(229,57,53,.12); border:1.5px solid rgba(229,57,53,.5);
      color:var(--red); font-size:.55rem; font-weight:900;
    }
    .msg.done { color:#4caf50; }
    @keyframes msgSpin { to { transform:rotate(360deg); } }

    /* ─ Monster grid ─ */
    .mob-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
      gap:8px; margin-top:4px;
    }
    .mob-card {
      background:white; border:2px solid var(--border); border-radius:10px;
      padding:10px 6px; text-align:center; cursor:pointer;
      transition:all .15s; position:relative;
    }
    .mob-card:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 12px var(--shadow); }
    .mob-card.sel { border-color:var(--gold); background:#fffbe8; box-shadow:0 0 0 3px rgba(245,166,35,.3); }
    .mob-card.sel::after { content:'✓'; position:absolute; top:4px; right:6px; font-size:.65rem; color:var(--gold); font-weight:700; }
    .mob-card img { width:44px; height:44px; object-fit:contain; image-rendering:pixelated; display:block; margin:0 auto 5px; }
    .mob-card .mn { font-size:.74rem; font-weight:700; color:var(--dark); line-height:1.2; }
    .mob-card .ml { font-size:.65rem; color:var(--gray); margin-top:1px; }

    /* ─ Checklist section ─ */
    #section-checklist { display:none; }

    /* ─ Tabs ─ */
    .tab-bar-wrap { margin-bottom:-1px; }
    .tab-bar {
      display:flex; gap:5px; padding:0 4px;
      overflow-x:auto; flex-wrap:nowrap;
      scrollbar-width:thin; scrollbar-color:rgba(200,146,42,.3) transparent;
    }
    .tab-bar::-webkit-scrollbar { height:3px; }
    .tab-bar::-webkit-scrollbar-track { background:transparent; }
    .tab-bar::-webkit-scrollbar-thumb { background:rgba(200,146,42,.35); border-radius:2px; }
    .tab-btn {
      display:flex; align-items:center; gap:5px;
      padding:7px 11px; border-radius:8px 8px 0 0;
      border:1px solid var(--border); border-bottom:none;
      background:#f5e8c8; color:var(--brown); font-size:.76rem;
      cursor:pointer; transition:background .15s;
      font-family:inherit; font-weight:500;
      flex-shrink:0; white-space:nowrap;
    }
    .tab-btn.active { background:var(--panel); color:var(--dark); font-weight:700; }
    .tab-status-dot {
      display:inline-block; width:7px; height:7px; border-radius:50%;
      margin-left:4px; vertical-align:middle; flex-shrink:0;
      transition:box-shadow .2s;
    }
    .tab-status-dot.clickable { cursor:pointer; }
    .tab-status-dot.running { background:#1a6fa8; animation:tabPulse 1.4s ease-in-out infinite; }
    .tab-status-dot.paused  { background:#bbb; }
    .tab-status-dot.dim     { background:rgba(180,180,180,.3); }
    /* 동기화: 바깥 동심원 (주황 링) */
    .tab-status-dot.synced.paused { box-shadow:0 0 0 2.5px rgba(20,160,140,.75); }
    .tab-status-dot.synced.dim    { box-shadow:0 0 0 2.5px rgba(20,160,140,.6); }
    .tab-status-dot.running.synced { animation:tabPulseSynced 1.4s ease-in-out infinite; }
    @keyframes tabPulse {
      0%,100% { opacity:1; transform:scale(1);   box-shadow:0 0 0 2px rgba(26,111,168,.2); }
      50%     { opacity:.7; transform:scale(1.5); box-shadow:0 0 0 4px rgba(26,111,168,.05); }
    }
    @keyframes tabPulseSynced {
      0%,100% { opacity:1; transform:scale(1);   box-shadow:0 0 0 2px rgba(26,111,168,.25), 0 0 0 4.5px rgba(20,160,140,.8); }
      50%     { opacity:.7; transform:scale(1.5); box-shadow:0 0 0 3.5px rgba(26,111,168,.08), 0 0 0 5.5px rgba(20,160,140,.55); }
    }
    .tab-btn img { width:22px; height:22px; object-fit:contain; image-rendering:pixelated; }
    .tab-btn .tab-close {
      margin-left:2px; color:#bbb; font-size:.85rem; line-height:1;
      padding:0 2px; border-radius:3px; flex-shrink:0;
    }
    .tab-btn .tab-close:hover { color:var(--red); background:#fee; }
    .tab-btn.dragging { opacity:.35; }
    .tab-btn.drag-over { border-color:var(--gold); background:#fff8e8; }
    .tab-add {
      padding:7px 11px; border-radius:8px 8px 0 0;
      border:1px dashed var(--border); border-bottom:none;
      background:transparent; color:var(--border); font-size:1rem;
      cursor:pointer; transition:color .15s, background .15s;
      font-family:inherit; flex-shrink:0;
    }
    .tab-add:hover { color:var(--brown); background:#f5e8c8; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ─ Monster bar ─ */
    .mob-bar {
      display:flex; align-items:center; gap:14px; padding:14px 18px;
      border-radius:12px;
    }
    .mob-bar img { width:56px; height:56px; object-fit:contain; image-rendering:pixelated; background:white; border:2px solid var(--border); border-radius:8px; padding:3px; flex-shrink:0; }
    .mob-bar .info h2 { font-size:1.2rem; font-weight:700; color:var(--dark); }
    .mob-bar .info .stats { font-size:.76rem; color:var(--gray); margin-top:2px; }
    .mob-bar .info a { font-size:.72rem; color:var(--brown); text-decoration:none; }
    .mob-bar .info a:hover { text-decoration:underline; }
    .mob-bar .actions { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    /* ─ Progress ─ */
    .prog-label { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
    .prog-label .cnt { font-size:.95rem; font-weight:700; color:var(--brown); }
    .prog-label .pct { font-size:.78rem; color:var(--gray); }
    .prog-bg { height:14px; background:#e8d9b8; border-radius:7px; overflow:hidden; border:1px solid var(--border); }
    .prog-fill { height:100%; background:linear-gradient(90deg,#f5a623,#4caf50); border-radius:7px; transition:width .4s ease; }
    .complete-badge { display:none; text-align:center; padding:10px; background:linear-gradient(135deg,#e8f5e9,#c8e6c9); border:2px solid #4caf50; border-radius:8px; color:#2e7d32; font-weight:700; font-size:.9rem; margin-top:10px; }

    /* ─ 메소 비 ─ */
    #meso-rain { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
    .sw-log-entry.complete { background:#fff9e6; border-left:3px solid #f5a623; font-weight:700; color:#7a4a1e; }

    /* ─ Main layout (items + stopwatch) ─ */
    .main-layout { display:flex; gap:16px; align-items:flex-start; }
    .items-section { flex:1; min-width:0; }
    .sw-section { width:195px; flex-shrink:0; position:sticky; top:68px; }

    /* ─ Item grid ─ */
    .item-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(105px,1fr));
      gap:10px;
    }

    /* ─ Item card ─ */
    .item-card {
      border-radius:10px; border:2px solid; overflow:hidden;
      cursor:pointer; transition:all .2s ease; position:relative;
      user-select:none;
    }

    /* ── NOT FOUND (dark/silhouette) ── */
    .item-card.nf {
      background:#1c1c1c; border-color:#383838;
    }
    .item-card.nf:hover { background:#242424; border-color:#555; }
    .item-card.nf .icon-wrap { background:#141414; }
    .item-card.nf .icon-wrap img { filter:brightness(.3) saturate(.2); }
    .item-card.nf .cn { color:#555; }
    .item-card.nf .cname { color:#777; }
    .item-card.nf .crate { color:#666; }
    .item-card.nf .ccnt { color:#666; }
    .item-card.nf .ctime { color:#555; }

    /* ── FOUND ── */
    .item-card.fd {
      background:white; border-color:var(--border);
    }
    .item-card.fd:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 4px 14px var(--shadow); }
    .item-card.fd .icon-wrap { background:#f5f0e8; }
    .item-card.fd .icon-wrap img { filter:none; }
    .item-card.fd .cname { color:var(--dark); }
    .item-card.fd .crate { color:var(--gray); }
    .item-card.fd .ccnt { color:var(--green); font-weight:700; }
    .item-card.fd .ctime { color:var(--gold); font-weight:500; }

    .item-card .icon-wrap {
      height:68px; display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .item-card .icon-wrap img {
      width:46px; height:46px; object-fit:contain; image-rendering:pixelated;
      transition:filter .3s;
    }

    /* count badge (top-right) */
    .item-card .cn {
      position:absolute; top:4px; right:5px;
      background:var(--gold); color:white;
      font-size:.6rem; font-weight:700;
      padding:1px 5px; border-radius:10px; min-width:17px; text-align:center;
    }

    .item-card .card-body { padding:6px 7px 8px; }
    .item-card .cname { font-size:.7rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; transition:color .2s; }
    .item-card .crate { font-size:.6rem; line-height:1.6; transition:color .2s; }
    .item-card .ccnt  { font-size:.6rem; line-height:1.6; transition:color .2s; }
    .item-card .ctime { font-size:.6rem; line-height:1.6; transition:color .2s; height:1em; }

    /* decrement button */
    /* decrement button (위) */
    .item-card .decr {
      position:absolute; bottom:26px; right:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.7rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
      pointer-events:auto;
    }
    .item-card:hover .decr { opacity:1; }
    .item-card .decr:hover { background:var(--red); color:white; }
    .item-card.nf .decr { display:none; }

    /* bulk button (아래) */
    .item-card .bulk-btn {
      position:absolute; bottom:5px; right:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.6rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
      pointer-events:auto; line-height:1;
    }
    .item-card:hover .bulk-btn { opacity:1; }
    .item-card .bulk-btn:hover { background:#1a6fa8; color:white; }
    .item-card.nf .bulk-btn { display:none; }
    .item-card.excl .bulk-btn { display:none; }

    /* exclude button */
    .item-card .excl-btn {
      position:absolute; top:5px; left:5px;
      width:17px; height:17px; border-radius:50%;
      border:none; background:rgba(200,200,200,.6); color:#555;
      font-size:.65rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s;
    }
    .item-card:hover .excl-btn { opacity:1; }
    .item-card .excl-btn:hover { background:#9e9e9e; color:white; }

    /* excluded state */
    .item-card.excl {
      background:#1a1014; border-color:#2a1a20;
      opacity:.55;
    }
    .item-card.excl .icon-wrap { background:#110a0d; }
    .item-card.excl .icon-wrap img { filter:brightness(.08) saturate(0); }
    .item-card.excl .cname { color:#4a3030; text-decoration:line-through; }
    .item-card.excl .crate,.item-card.excl .ccnt,.item-card.excl .ctime { color:#3a2020; }
    .item-card.excl .excl-btn { opacity:1; background:rgba(180,60,60,.5); color:#ffaaaa; }
    .item-card.excl .excl-btn:hover { background:var(--red); color:white; }
    .item-card.excl .decr { display:none; }

    /* 사냥 기준 버튼 */
    .item-card .tl-base-btn {
      position:absolute; bottom:47px; right:5px;
      width:15px; height:15px; border-radius:50%;
      border:1.5px solid rgba(180,180,180,.3); background:rgba(255,255,255,.06);
      color:rgba(160,160,160,.6); font-size:.5rem; line-height:1;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; opacity:0; transition:opacity .15s, background .15s, border-color .15s, color .15s;
    }
    .item-card:hover .tl-base-btn { opacity:1; }
    .item-card:hover .tl-base-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(245,166,35,.12); }
    .item-card.tl-base .tl-base-btn {
      opacity:1; background:var(--gold); border-color:var(--gold); color:#fff;
      box-shadow:0 0 6px rgba(245,166,35,.5);
    }
    .item-card.tl-base-hidden .tl-base-btn {
      opacity:1; background:#a06c10; border-color:#c88a20; color:#f5d080;
      box-shadow:0 0 4px rgba(200,138,32,.3);
    }
    .item-card.excl .tl-base-btn { display:none; }
    /* 사냥기준 카드 강조 */
    .item-card.tl-base { border-color:#c8a84b !important; }
    .item-card.tl-base-hidden { border-color:#7a5f1a !important; opacity:.75; }

    /* 제외 토글 버튼 */
    .excl-toggle {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 10px; border-radius:8px; border:1.5px solid var(--border);
      background:white; font-family:inherit; font-size:.75rem;
      color:var(--gray); cursor:pointer; transition:all .15s; margin-bottom:10px;
    }
    .excl-toggle:hover { border-color:var(--gold); color:var(--brown); }
    .excl-toggle.hide-excl { background:#fff0f0; border-color:#f5c6c6; color:var(--red); }

    /* ─ Hunt Estimate ─ */
    .hunt-count {
      font-size:1.5rem; font-weight:700; color:var(--dark);
      text-align:center; letter-spacing:-.5px; padding:4px 0 2px;
    }
    .hunt-reason {
      font-size:.65rem; color:var(--gray); text-align:center;
      line-height:1.4; padding-bottom:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ─ Stopwatch ─ */
    .sw-display {
      font-family:'Courier New',monospace;
      font-size:1.5rem; font-weight:700; color:var(--dark);
      text-align:center; letter-spacing:-.5px;
      padding:10px 0 8px;
      font-variant-numeric:tabular-nums;
    }
    .sw-ch-elapsed { font-size:.72rem; color:#1a6fa8; margin:-6px 0 4px; display:flex; align-items:center; gap:5px; }
    .sw-ch-elapsed .sw-ch-val { font-family:'Courier New',monospace; font-weight:700; }
    .sw-ch-elapsed .sw-ch-hide { background:none; border:none; color:#a0c4e0; font-size:.65rem; cursor:pointer; padding:0 2px; line-height:1; }
    .sw-ch-elapsed .sw-ch-hide:hover { color:#e55; }
    .sw-btns { display:flex; flex-direction:column; gap:8px; }
    .sw-btn {
      padding:9px; border:none; border-radius:8px;
      font-family:inherit; font-size:.85rem; font-weight:700;
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .sw-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .sw-start { background:#4caf50; color:white; }
    .sw-pause { background:#f5a623; color:white; }
    .sw-reset { background:transparent; color:#ccc; border:1px solid #ddd; font-size:.62rem; padding:3px 10px; font-weight:400; }
    .sw-reset:hover { background:#fff0f0; color:#c62828; border-color:#ffcdd2; filter:none; transform:none; }
    .sw-channel { background:#e8f4fd; color:#1a6fa8; font-size:.8rem; }
    .sw-sync { background:#e8f4fd; color:#1a6fa8; border:1px solid #a8d4f0; font-size:.72rem; padding:6px 10px; border-radius:8px; cursor:pointer; display:none; }
    .sw-sync.sw-sync-on { background:#1a6fa8; color:#fff; border-color:#1a6fa8; }

    /* sw log */
    .sw-log { margin-top:14px; }
    .sw-log-list { max-height:220px; overflow-y:auto; margin-top:6px; }
    .sw-log-entry {
      display:flex; align-items:baseline; gap:6px;
      font-size:.68rem; padding:4px 6px; border-radius:6px;
      background:white; margin-bottom:4px; border:1px solid #eee;
    }
    .sw-log-entry .lt { color:var(--gold); font-weight:700; font-family:'Courier New',monospace; flex-shrink:0; }
    .sw-log-entry .ln { color:var(--dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
    .sw-log-entry .ldel { margin-left:auto; flex-shrink:0; background:none; border:none; cursor:pointer; color:#bbb; font-size:.75rem; padding:0 2px; line-height:1; }
    .sw-log-entry .ldel:hover { color:#e55; }
    .sw-log-list::-webkit-scrollbar { width:4px; }
    .sw-log-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ─ 완료 진열장 ─ */
    .trophy-open-btn {
      display:flex; align-items:center; gap:8px; cursor:pointer;
      background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(245,166,35,.06));
      border:1.5px solid rgba(245,166,35,.35); border-radius:10px;
      padding:8px 12px; margin-top:6px; transition:border-color .2s, background .2s;
    }
    .trophy-open-btn:hover { border-color:rgba(245,166,35,.8); background:linear-gradient(135deg,rgba(245,166,35,.22),rgba(245,166,35,.1)); }
    .trophy-open-btn .tob-icon { font-size:1.1rem; }
    .trophy-open-btn .tob-text { flex:1; }
    .trophy-open-btn .tob-title { font-size:.75rem; color:rgba(245,166,35,.9); font-weight:700; }
    .trophy-open-btn .tob-sub { font-size:.6rem; color:rgba(200,168,107,.6); margin-top:1px; }
    .trophy-open-btn .tob-arrow { font-size:.65rem; color:rgba(200,168,107,.5); }

    /* 트로피룸 모달 */
    .trophy-overlay {
      display:none; position:fixed; inset:0; z-index:300;
      background:rgba(0,0,0,.7); align-items:center; justify-content:center;
    }
    .trophy-overlay.open { display:flex; }
    .trophy-modal {
      position:relative;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 5px),
        radial-gradient(ellipse at 25% 20%, rgba(120,15,15,.45) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(90,10,10,.4) 0%, transparent 55%),
        linear-gradient(160deg, #1c0404, #2a0808, #1c0404);
      border:none;
      border-radius:18px;
      width:min(640px,94vw); max-height:82vh; display:flex; flex-direction:column;
      box-shadow:
        0 0 0 3px #6b2e0a,
        0 0 0 5px #c8922a,
        0 0 0 7px #5a2508,
        0 24px 70px rgba(0,0,0,.85),
        inset 0 1px 0 rgba(255,220,130,.08);
      overflow:hidden;
    }
    .trophy-modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px 13px;
      border-bottom:1px solid rgba(200,146,42,.3);
      background:
        linear-gradient(90deg, rgba(200,146,42,.07) 0%, transparent 40%, transparent 60%, rgba(200,146,42,.07) 100%);
      flex-shrink:0;
      position:relative;
    }
    .trophy-modal-header::after {
      content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%);
      width:40%; height:1px;
      background:linear-gradient(90deg, transparent, rgba(245,166,35,.55), transparent);
      pointer-events:none;
    }
    .trophy-modal-title { font-size:1rem; font-weight:700; color:var(--gold); letter-spacing:.05em; text-shadow:0 0 12px rgba(245,166,35,.2); }
    .trophy-modal-sub { font-size:.63rem; color:rgba(200,168,107,.52); margin-top:3px; letter-spacing:.02em; }
    .trophy-modal-close {
      width:27px; height:27px; border-radius:50%;
      border:1px solid rgba(245,166,35,.35); background:rgba(245,166,35,.04);
      color:rgba(245,166,35,.6); font-size:.75rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all .15s;
    }
    .trophy-modal-close:hover { background:rgba(245,166,35,.14); color:var(--gold); border-color:rgba(245,166,35,.65); }
    .trophy-sort-bar {
      display:flex; gap:6px; padding:10px 24px;
      border-bottom:1px solid rgba(200,146,42,.14); flex-shrink:0;
      background:rgba(0,0,0,.12);
    }
    .trophy-sort-btn {
      display:flex; align-items:center; gap:4px;
      padding:4px 11px; border-radius:6px;
      border:1px solid rgba(245,166,35,.18);
      background:none; color:rgba(200,168,107,.55); font-size:.63rem; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all .15s; letter-spacing:.02em;
    }
    .trophy-sort-btn:hover { border-color:rgba(245,166,35,.48); color:rgba(245,166,35,.82); background:rgba(245,166,35,.05); }
    .trophy-sort-btn.active { border-color:rgba(245,166,35,.65); background:rgba(245,166,35,.1); color:rgba(245,166,35,.92); }
    .trophy-sort-arrow { font-size:.58rem; }
    .trophy-modal-body {
      overflow-y:auto; padding:22px 22px 26px;
      background:
        repeating-linear-gradient(0deg,  rgba(255,255,255,.007) 0px, rgba(255,255,255,.007) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.007) 0px, rgba(255,255,255,.007) 1px, transparent 1px, transparent 4px),
        radial-gradient(ellipse at 50% 0%, rgba(140,18,18,.22) 0%, transparent 62%),
        radial-gradient(ellipse at 50% 100%, rgba(80,10,10,.2) 0%, transparent 55%),
        linear-gradient(180deg, #1e0508, #250608, #1e0508);
      box-shadow:inset 0 6px 20px rgba(0,0,0,.45), inset 0 -6px 20px rgba(0,0,0,.35);
    }
    .trophy-modal-body::-webkit-scrollbar { width:4px; }
    .trophy-modal-body::-webkit-scrollbar-track { background:rgba(0,0,0,.15); }
    .trophy-modal-body::-webkit-scrollbar-thumb { background:rgba(200,146,42,.35); border-radius:2px; }
    .trophy-stats-bar { display:flex; flex-shrink:0; border-bottom:1px solid rgba(200,146,42,.18); background:rgba(0,0,0,.18); }
    .trophy-stat-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 8px; gap:3px; border-right:1px solid rgba(200,146,42,.1); }
    .trophy-stat-item:last-child { border-right:none; }
    .trophy-stat-icon { font-size:.78rem; opacity:.65; }
    .trophy-stat-num { font-size:1.05rem; font-weight:700; color:var(--gold); font-family:'Courier New',monospace; }
    .trophy-stat-label { font-size:.54rem; color:rgba(200,168,107,.5); letter-spacing:.03em; }
    .trophy-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(152px,1fr)); gap:18px; }
    .trophy-card {
      display:flex; flex-direction:column; align-items:center; gap:0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,195,50,.05) 0%, transparent 58%),
        linear-gradient(185deg, #3d2010 0%, #1e0a03 52%, #351808 100%);
      border-radius:10px;
      padding:18px 14px 15px; cursor:pointer;
      position:relative;
      box-shadow:
        0 0 0 1px rgba(160,100,20,.85),
        0 0 0 3px rgba(12,5,0,.95),
        0 0 0 4.5px rgba(200,146,42,.28),
        0 12px 32px rgba(0,0,0,.72),
        inset 0 1px 0 rgba(255,220,100,.07),
        inset 0 -1px 0 rgba(0,0,0,.55);
      transition:box-shadow .25s, transform .22s;
      overflow:visible;
    }
    .trophy-card:hover {
      box-shadow:
        0 0 0 1px rgba(245,166,35,.95),
        0 0 0 3px rgba(12,5,0,.95),
        0 0 0 5px rgba(200,146,42,.45),
        0 18px 48px rgba(0,0,0,.8),
        0 0 22px rgba(245,166,35,.12),
        inset 0 1px 0 rgba(255,220,100,.1),
        inset 0 -1px 0 rgba(0,0,0,.55);
      transform:translateY(-5px);
    }
    .trophy-portrait {
      width:70px; height:70px; border-radius:10px;
      background:radial-gradient(circle at 38% 30%, #3d2300, #0d0400);
      box-shadow:
        0 0 0 2px rgba(200,150,30,.8),
        0 0 0 3.5px rgba(10,4,0,.9),
        0 0 0 5.5px rgba(180,130,30,.35),
        inset 0 2px 10px rgba(0,0,0,.75);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      position:relative; margin-bottom:11px; flex-shrink:0;
    }
    .trophy-portrait img { width:80%; height:80%; object-fit:contain; image-rendering:pixelated; }
    .trophy-portrait::after {
      content:''; position:absolute; inset:0; border-radius:9px;
      background:linear-gradient(140deg,rgba(255,220,100,.12) 0%,transparent 55%);
      pointer-events:none;
    }
    .trophy-sep {
      width:68%; height:1px; flex-shrink:0;
      background:linear-gradient(90deg, transparent, rgba(200,146,42,.55), rgba(245,166,35,.38), rgba(200,146,42,.55), transparent);
      margin:0 auto 9px;
    }
    .trophy-info { width:100%; text-align:center; }
    .trophy-name { font-size:.71rem; color:rgba(255,222,140,.95); font-weight:700; margin-bottom:5px; letter-spacing:.02em; }
    .trophy-stats { font-size:.57rem; color:rgba(200,168,107,.58); line-height:1.8; }
    .trophy-date-badge {
      font-size:.49rem; font-weight:700; letter-spacing:.09em;
      color:rgba(245,166,35,.72); margin-top:5px; display:inline-block;
      background:linear-gradient(90deg, transparent, rgba(200,146,42,.12), transparent);
      padding:2px 10px; border-top:1px solid rgba(200,146,42,.18);
    }
    .trophy-del {
      position:absolute; top:7px; right:7px; width:17px; height:17px;
      border-radius:50%; border:1px solid rgba(255,80,80,.3); background:none;
      color:rgba(255,100,100,.4); font-size:.55rem; cursor:pointer; line-height:1;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .15s, background .15s, color .15s, border-color .15s;
    }
    .trophy-card:hover .trophy-del { opacity:1; }
    .trophy-del:hover { background:rgba(180,30,30,.25); color:rgba(255,130,130,.95); border-color:rgba(255,80,80,.75); }

    /* 삭제 confirm 다이얼로그 */
    .del-confirm-overlay {
      display:none; position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,.6); align-items:center; justify-content:center;
      backdrop-filter:blur(2px);
    }
    .del-confirm-overlay.open { display:flex; }
    .del-confirm-dialog {
      position:relative;
      background:
        radial-gradient(ellipse at 30% 15%, rgba(120,15,15,.3) 0%, transparent 55%),
        linear-gradient(165deg, #1e0506, #2a0708, #1e0506);
      border-radius:14px; width:min(320px,86vw);
      box-shadow:
        0 0 0 1.5px #6b2e0a,
        0 0 0 3.5px #c8922a,
        0 0 0 5.5px #4a2008,
        0 24px 70px rgba(0,0,0,.95),
        inset 0 1px 0 rgba(255,220,130,.05);
      overflow:hidden;
      animation: delConfirmIn .18s ease-out;
    }
    @keyframes delConfirmIn {
      from { opacity:0; transform:scale(.94) translateY(6px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .del-confirm-body {
      padding:30px 26px 22px;
      border-bottom:1px solid rgba(200,146,42,.2);
    }
    .del-confirm-icon {
      font-size:1.5rem; text-align:center; margin-bottom:13px; opacity:.8;
    }
    .del-confirm-msg {
      font-size:.78rem; color:rgba(255,218,128,.82); line-height:1.65; text-align:center;
    }
    .del-confirm-name {
      color:rgba(245,166,35,.95); font-weight:700;
    }
    .del-confirm-sub {
      font-size:.62rem; color:rgba(200,168,107,.38); margin-top:7px; text-align:center;
      letter-spacing:.02em;
    }
    .del-confirm-actions {
      display:flex;
      background:rgba(0,0,0,.3);
    }
    .del-confirm-btn {
      flex:1; padding:14px; border:none; background:none;
      font-family:inherit; font-size:.76rem; font-weight:600;
      cursor:pointer; transition:background .15s, color .15s;
      letter-spacing:.03em;
    }
    .del-confirm-btn-cancel {
      color:rgba(200,168,107,.55); border-right:1px solid rgba(200,146,42,.18);
    }
    .del-confirm-btn-cancel:hover { background:rgba(255,255,255,.04); color:rgba(200,168,107,.88); }
    .del-confirm-btn-del { color:rgba(235,90,90,.65); }
    .del-confirm-btn-del:hover { background:rgba(180,30,30,.2); color:rgba(255,120,120,.92); }

    /* ─ Saves ─ */
    .saves-wrap { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-top:6px; }
    .save-card {
      position:relative; background:white; border:2px solid var(--border);
      border-radius:12px; padding:12px 10px 10px; cursor:pointer;
      transition:all .15s; text-align:center;
    }
    .save-card:hover { border-color:var(--gold); box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .save-card.act { border-color:var(--gold); background:#fffbe8; }
    .save-card.complete { border-color:#4caf50; background:#f1fff3; }
    .save-card-name {
      font-size:.78rem; font-weight:700; color:var(--dark);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px;
    }
    .save-card-pct {
      font-size:1.6rem; font-weight:900; line-height:1;
      color:var(--gold); margin-bottom:4px;
    }
    .save-card.complete .save-card-pct { color:#4caf50; }
    .save-card-count { font-size:.65rem; color:var(--gray); margin-bottom:8px; }
    .save-card-bar-bg {
      height:6px; background:#eee; border-radius:3px; overflow:hidden;
    }
    .save-card-bar-fill {
      height:100%; border-radius:3px;
      background:linear-gradient(90deg,#f5a623,#e8890a);
      transition:width .3s;
    }
    .save-card.complete .save-card-bar-fill { background:linear-gradient(90deg,#66bb6a,#43a047); }
    .save-card-del {
      position:absolute; top:6px; right:8px;
      background:none; border:none; color:#ccc; font-size:.7rem;
      cursor:pointer; padding:0; line-height:1;
    }
    .save-card-del:hover { color:var(--red); }
    .no-saves { font-size:.8rem; color:var(--gray); }

    /* ─ Timeline ─ */
    .tl-toggle-btn {
      font-size:.58rem; padding:2px 8px; border-radius:8px;
      border:1px solid var(--border); background:#f5f0e8; color:var(--brown);
      cursor:pointer; margin-left:6px; font-family:inherit; vertical-align:middle;
      transition:background .15s, color .15s, border-color .15s;
    }
    .tl-toggle-btn.on { background:var(--gold); color:#fff; border-color:var(--gold); }
    .tl-rows { margin-top:4px; }
    .tl-row { position:relative; margin-bottom:4px; }
    .tl-callouts { position:relative; min-height:0; }
    .tl-bar-zone { position:relative; }
    .tl-time-labels { display:flex; justify-content:space-between; font-size:.42rem; color:#bbb; margin-top:2px; font-weight:700; line-height:1; }
    .tl-callout { position:absolute; transform:translateX(-50%); }
    .tl-callout-box {
      position:relative; width:34px; height:34px;
      border:2px solid #aaa; border-radius:6px;
      background:white; overflow:hidden;
      box-shadow:0 1px 4px rgba(0,0,0,.15);
    }
    .tl-callout-box img { width:28px; height:28px; object-fit:contain; image-rendering:pixelated; display:block; margin:1px auto; }
    .tl-arrow { width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-top:5px solid #aaa; margin:0 auto; }
    .tl-arrow-spacer { height:5px; }
    .tl-r0 { border-color:#3498db; }
    .tl-r1 { border-color:#2ecc71; box-shadow:0 1px 5px rgba(46,204,113,.3); }
    .tl-r2 { border-color:#f1c40f; box-shadow:0 1px 5px rgba(241,196,15,.3); }
    .tl-r3 { border-color:#e67e22; box-shadow:0 1px 6px rgba(230,126,34,.4); }
    .tl-r4 { border-color:#e74c3c; box-shadow:0 1px 6px rgba(231,76,60,.4); }
    .tl-r5 { border-color:#9b59b6; box-shadow:0 1px 6px rgba(155,89,182,.45); }
    .tl-bar-wrap { position:relative; height:8px; border-radius:4px; background:#ececec; overflow:hidden; }
    .tl-bar-fill { height:100%; border-radius:4px; transition:width 1s linear; }
    .tl-cluster { position:absolute; bottom:0; transform:translateX(-50%); width:34px; height:43px; cursor:pointer; }
    .tl-callout-wrap { position:absolute; bottom:0; left:0; transform-origin:bottom center; transition:transform .25s ease; }
    .tl-cluster .tl-extra { display:none; }
    .tl-cluster.open .tl-extra { display:flex; flex-direction:column; }
    .tl-cluster-badge { position:absolute; top:-5px; right:-7px; background:#555; color:#fff; font-size:.5rem; min-width:14px; height:14px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-weight:700; padding:0 2px; pointer-events:none; z-index:10; transition:opacity .2s; }
    .tl-cluster.open .tl-cluster-badge { opacity:0; }
    .tl-dup-badge { position:absolute; top:-4px; right:-4px; background:#333; color:#fff; font-size:.45rem; font-weight:700; border-radius:5px; padding:1px 3px; line-height:1.3; pointer-events:none; z-index:5; }
    .tl-ch-mark { position:absolute; top:0; width:2px; height:8px; background:rgba(255,255,255,.9); box-shadow:0 0 0 1px rgba(0,0,0,.2); transform:translateX(-50%); pointer-events:none; border-radius:1px; z-index:2; }
    .sw-log-entry.sw-log-channel { background:#e8f4fd; border-left:3px solid #3498db; color:#1a6fa8; }

    /* ─ Rate badges ─ */
    .rb { font-size:.58rem; padding:1px 5px; border-radius:10px; font-weight:700; }
    .rb-blue   { background:#e8f4fd; color:#1a6fa8; }
    .rb-green  { background:#e8f8e8; color:#1a7a1a; }
    .rb-yellow { background:#fff8e1; color:#996600; }
    .rb-orange { background:#fff3e0; color:#e65100; }
    .rb-red    { background:#fce4ec; color:#c62828; }
    .rb-purple { background:#f3e5f5; color:#6a1b9a; }

    /* ─ Result Modal ─ */
    .result-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:1000;
      display:flex; align-items:flex-start; justify-content:center;
      padding:24px 16px; backdrop-filter:blur(4px);
      overflow-y:auto;
    }
    .result-modal {
      max-width:520px; width:100%; overflow: visible;
      border-radius:20px; box-shadow:0 16px 60px rgba(0,0,0,.5);
      margin:auto;
    }
    /* 카드 본체 — 다크 배경 */
    .result-card {
      background:linear-gradient(160deg,#1e1408 0%,#2d1f0a 60%,#1a1005 100%);
      border-radius:20px; padding:28px 24px 24px;
      display:flex; flex-direction:column; gap:20px;
      border:1px solid rgba(245,166,35,.25);
    }
    /* 상단 히어로 — 좌측 이미지+이름 / 우측 스탯 */
    .result-hero { display:flex; align-items:center; gap:16px; }
    .result-hero-left { display:flex; flex-direction:column; align-items:center; gap:7px; flex-shrink:0; }
    .result-mob-img-wrap {
      width:88px; height:88px;
      background:rgba(255,255,255,.06); border-radius:14px;
      border:2px solid rgba(245,166,35,.3);
      display:flex; align-items:center; justify-content:center;
    }
    .result-mob-img { width:74px; height:74px; object-fit:contain; }
    .result-mob-name {
      font-size:.9rem; font-weight:800; color:#fff; line-height:1.2;
      text-shadow:0 2px 8px rgba(0,0,0,.6);
      text-align:center; word-break:keep-all; max-width:96px;
    }
    /* 스탯 — 우측 2열 그리드, 진척도 전체폭 */
    .result-hero-right { flex:1; min-width:0; }
    .result-hero-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .result-stat-block {

    /* 도감 완성 카드 */
    @keyframes prismaShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }

    }
    @keyframes prismaFlow {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    @keyframes prismaFlowBox {
      0%   { background-position: 0% center, 0% 0%; }
      100% { background-position: 300% center, 0% 0%; }
    }
    @keyframes borderGlow {
      0%,100% { box-shadow: 0 0 18px 3px rgba(245,166,35,.55), 0 0 60px rgba(245,100,35,.18), inset 0 0 30px rgba(245,166,35,.06); }
      25%      { box-shadow: 0 0 22px 5px rgba(200,80,255,.4),  0 0 70px rgba(80,200,255,.18), inset 0 0 30px rgba(180,80,255,.05); }
      50%      { box-shadow: 0 0 20px 4px rgba(80,200,255,.5),  0 0 65px rgba(245,166,35,.2),  inset 0 0 30px rgba(80,200,255,.06); }
      75%      { box-shadow: 0 0 22px 5px rgba(80,255,160,.4),  0 0 70px rgba(200,80,255,.18), inset 0 0 30px rgba(80,255,160,.05); }
    }
    @keyframes foilFlow {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 200%; }
    }
    @keyframes goldSweep {
      0%   { transform: translateX(-120%) skewX(-20deg); }
      100% { transform: translateX(250%)  skewX(-20deg); }
    }
    .result-card.complete {
      background: linear-gradient(160deg,#1a0e00 0%,#2a1800 35%,#1e1200 60%,#2e1a00 100%);
      border: 1.5px solid transparent;
      border-radius: 20px;
      position: relative;
      animation: borderGlow 4s ease-in-out infinite;
    }
    .result-card.complete::before {
      content:'';
      position:absolute; inset:-1.5px; border-radius:21px; z-index:0;
      background: linear-gradient(125deg,
        #f5a623 0%, #ffe066 12%, #c8f0ff 24%, #b388ff 36%,
        #69f0ae 48%, #f5a623 60%, #ff80ab 72%, #80d8ff 84%, #ffe066 100%
      );
      background-size: 300% 300%;
      animation: prismaShift 5s ease infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      padding: 1.5px;
      opacity: .85;
    }
    .result-card.complete > * { position:relative; z-index:1; }
    .result-card.complete::after {
      content:'';
      position:absolute; inset:0; border-radius:20px; z-index:0; pointer-events:none;
      background: repeating-linear-gradient(
        115deg,
        transparent 0px, transparent 18px,
        rgba(255,255,255,.018) 19px, rgba(255,255,255,.018) 20px
      ),
      linear-gradient(160deg,
        rgba(245,166,35,.08) 0%, rgba(180,80,255,.05) 30%,
        rgba(80,200,255,.07) 60%, rgba(80,255,160,.05) 100%
      );
      overflow:hidden;
    }
    /* 틸트 — 완료/미완료 공통 */
    .result-card {
      transform: perspective(700px) rotateX(0deg) rotateY(0deg);
      transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .result-card.tilt {
      transform: perspective(700px)
        rotateX(calc((var(--my, 0.5) - 0.5) * -12deg))
        rotateY(calc((var(--mx, 0.5) - 0.5) * 12deg));
    }
    /* 미완료 — 단색 하이라이트만 */
    .result-card:not(.complete) .mouse-glow {
      position:absolute; inset:0; border-radius:20px; z-index:3; pointer-events:none;
      overflow:hidden;
      mix-blend-mode: color-dodge;
      opacity:0; transition:opacity 0.9s ease;
    }
    .result-card:not(.complete).tilt .mouse-glow { opacity:0.28; }
    .result-card:not(.complete) .mouse-glow::before {
      content:'';
      position:absolute; inset:-20%;
      background: radial-gradient(
        ellipse at calc(var(--mx, 0.5) * 100%) calc(var(--my, 0.5) * 100%),
        rgba(220,210,190,.9) 0%, transparent 65%
      );
      filter: blur(28px);
    }
    .result-card.complete .gold-shimmer {
      position:absolute; inset:0; border-radius:20px; z-index:2; pointer-events:none; overflow:hidden;
      mix-blend-mode: color-dodge;
      opacity:0; transition: opacity 0.9s ease;
    }
    .result-card.complete.tilt .gold-shimmer { opacity:0.55; }
    /* 배경 전체를 물들이는 넓은 무지개 */
    .result-card.complete .gold-shimmer::before {
      content:'';
      position:absolute; inset:-40%;
      background: conic-gradient(
        from calc(var(--mx, 0.5) * 270deg + 180deg)
        at calc(var(--mx, 0.5) * 100%) calc(var(--my, 0.5) * 100%),
        rgba(255,80,80,.22),
        rgba(255,200,50,.22),
        rgba(60,255,140,.22),
        rgba(40,190,255,.22),
        rgba(180,60,255,.22),
        rgba(255,80,80,.22)
      );
      filter: blur(38px);
    }
    /* 마우스 위치 중심 specular */
    .result-card.complete .gold-shimmer::after {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(
        ellipse 55% 45% at calc(var(--mx, 0.5)*100%) calc(var(--my, 0.5)*100%),
        rgba(255,255,255,.08) 0%,
        transparent 65%
      );
    }
    .result-card.complete .mouse-glow {
      position:absolute; inset:0; border-radius:20px; z-index:3; pointer-events:none;
      background: radial-gradient(
        ellipse 50% 40% at calc(var(--mx, 0.5)*100%) calc(var(--my, 0.5)*100%),
        rgba(255,255,255,.08) 0%, transparent 70%);
      mix-blend-mode: overlay;
      opacity:0; transition:opacity 0.9s ease;
    }

    }
    .result-card.complete .result-section-title {

<div class="container">

  <!-- ① 몬스터 선택 -->
  <div class="panel" id="panel-select">

    <div class="search-row">
      <input type="text" id="name-input" placeholder="몬스터 이름 입력 (예: 슬라임, 주황버섯)"

// 2. 전역 상태 (탭 기반)
// ══════════════════════════════════════════
const MAX_TABS = 8;

function makeTab(idx) {
  return { idx, mob: null, sw: { base:0, startTs:null, ticker:null }, synced: false };
}

let tabs = [makeTab(0)];
let activeTabIdx = 0;
let _dragTabIdx = -1;

function activeTab() { return tabs[activeTabIdx]; }
// 하위 호환: activeMob getter/setter
Object.defineProperty(window, 'activeMob', {
  get() { return activeTab().mob; },
  set(v) { activeTab().mob = v; }
});

// ══════════════════════════════════════════
// 3. 스토리지
// ══════════════════════════════════════════
const S_KEY = 'maple_dogam_v2';

function loadS()    { try{return JSON.parse(localStorage.getItem(S_KEY))||{};}catch{return{};} }
function saveS(d)   { try{localStorage.setItem(S_KEY, JSON.stringify(d));}catch(e){console.warn('저장 실패(용량 초과?):',e);} }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════
// 4. 스톱워치 (탭별)
// ══════════════════════════════════════════
function swOf(tab) { return tab.sw; }

function swElapsed(tab) {
  tab = tab || activeTab();
  const sw = swOf(tab);
  return sw.startTs !== null ? sw.base + (Date.now() - sw.startTs) : sw.base;
}

function _swStartOne(tab, panel) {
  if (tab.sw.startTs !== null) return;
  tab.sw.startTs = Date.now();
  const tabRef = tab;
  tab.sw.ticker = setInterval(() => swTickPanel(getPanelOf(tabRef.idx), tabRef), 50);
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '⏸ 일시정지';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-pause sw-toggle';
  }
}

function _swPauseOne(tab, panel) {
  if (tab.sw.startTs === null) return;
  tab.sw.base += Date.now() - tab.sw.startTs;
  tab.sw.startTs = null;
  clearInterval(tab.sw.ticker); tab.sw.ticker = null;
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '▶ 시작';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
  }
  saveSwState(tab);
}

function _swResetOne(tab, panel) {
  clearInterval(tab.sw.ticker); tab.sw.ticker = null;
  tab.sw.base = 0; tab.sw.startTs = null;
  if (panel) {
    panel.querySelector('.sw-toggle').textContent = '▶ 시작';
    panel.querySelector('.sw-toggle').className = 'sw-btn sw-start sw-toggle';
    panel.querySelector('.sw-log-list').innerHTML = '';
    const chEl = panel.querySelector('.sw-ch-elapsed');
    if (chEl) { chEl.style.display = 'none'; chEl.style.visibility = ''; delete chEl.dataset.hidden; }
    const tl = panel.querySelector('.tl-section'); if (tl) tl.style.display='none';
    swTickPanel(panel, tab);
  }
  if (tab.mob) { const s = loadS(); delete s[`sw_mob_${tab.mob.id}`]; delete s[`sw_ch_${tab.mob.id}`]; saveS(s); }
}

function swToggle() {
  const tab = activeTab();
  const panel = getActivePanel();
  const isRunning = tab.sw.startTs !== null;
  if (isRunning) _swPauseOne(tab, panel);
  else _swStartOne(tab, panel);
  if (tab.synced) {
    tabs.forEach(t => {
      if (t !== tab && t.synced) {
        const p = getPanelOf(t.idx);
        if (isRunning) _swPauseOne(t, p);
        else _swStartOne(t, p);
      }
    });
  }
  renderTabBar();
}

function swReset() {
  if (!confirm('스톱워치와 획득 기록을 리셋할까요?')) return;
  const tab = activeTab();
  _swResetOne(tab, getActivePanel());
  if (tab.synced) {
    tabs.forEach(t => { if (t !== tab && t.synced) _swResetOne(t, getPanelOf(t.idx)); });
  }
  renderTabBar();
}

function swSyncToggle() {
  tabSyncToggle(activeTab().idx);
}

function tabSyncToggle(tabIdx) {
  const tab = tabs.find(t => t.idx === tabIdx);
  if (!tab) return;
  tab.synced = !tab.synced;
  updateSyncBtn(getPanelOf(tabIdx), tab);
  renderTabBar();
}

function updateSyncBtn(panel, tab) {
  if (!panel) return;
  const btn = panel.querySelector('.sw-sync');
  if (!btn) return;
  btn.style.display = tabs.length >= 2 ? 'block' : 'none';
  btn.textContent = tab.synced ? '🔗 동기화 중' : '🔗 동기화';
  btn.className = 'sw-sync' + (tab.synced ? ' sw-sync-on' : '');
}

function updateAllSyncBtns() {
  tabs.forEach(t => updateSyncBtn(getPanelOf(t.idx), t));
}

// sw 상태를 localStorage에 저장 (몹별)
function saveSwState(tab) {
  const mob = tab.mob;
  if (!mob) return;
  const s = loadS();
  s[`sw_mob_${mob.id}`] = { base: swElapsed(tab) };
  saveS(s);
}

// 몹에 저장된 sw 상태를 탭에 복원 (항상 정지 상태로)
function restoreSwState(tab, mob) {
  const s = loadS();
  const saved = s[`sw_mob_${mob.id}`];
  // 현재 돌던 ticker 정지
  clearInterval(tab.sw.ticker);
  tab.sw.ticker = null;
  tab.sw.startTs = null;
  tab.sw.base = saved ? (saved.base || 0) : 0;
}

function swTickPanel(panel, tab) {
  const el = panel?.querySelector('.sw-display');
  if (el) el.textContent = fmtTime(swElapsed(tab));
  // 채널 경과 업데이트
  const chEl = panel?.querySelector('.sw-ch-elapsed');
  if (chEl) {
    const lastChEntry = panel?.querySelector('.sw-log-entry.sw-log-channel');
    if (lastChEntry) {
      const lastChMs = parseFloat(lastChEntry.dataset.chMs) || 0;
      const sinceMs  = Math.max(0, swElapsed(tab) - lastChMs);
      chEl.querySelector('.sw-ch-val').textContent = fmtTimeLog(sinceMs);
      if (chEl.style.display === 'none') chEl.style.display = '';
    }
  }
  if (!tab.mob) return;
  const totalMs = swElapsed(tab);
  if (totalMs < 1000) return;
  const sec = Math.floor(totalMs / 1000);
  const min = Math.floor(totalMs / 60000);
  // 매초: 행 수 변경 감지 (1시간 지나면 새 줄 추가)
  if (tab._tlLastSec !== sec) {
    tab._tlLastSec = sec;
    const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
    const section = panel?.querySelector('.tl-section');
    const currentRows = section ? section.querySelectorAll('.tl-row').length : 0;
    if (currentRows !== totalRows) {
      renderTimeline(panel, tab.mob, tab);
      tab._tlLastMin = min;
      return;
    }
  }
  // 매분: 마지막 행 게이지 fill 업데이트
  if (tab._tlLastMin !== min) {
    tab._tlLastMin = min;
    tlUpdateFill(panel, totalMs);
  }
}

// ══════════════════════════════════════════
// 5. 타임라인
// ══════════════════════════════════════════
const TL_ROW_MS = 1 * 3600 * 1000;   // 1시간 = 한 줄
const TL_MAX_MS = 100 * 3600 * 1000; // 100시간 = 빨강 기준

const TL_RARITY = [
  { min:1,     cls:'tl-r0', color:'#3498db'  }, // 파랑  (1%~100%)
  { min:0.1,   cls:'tl-r1', color:'#2ecc71'  }, // 초록  (0.1%~1%)
  { min:0.01,  cls:'tl-r2', color:'#f1c40f'  }, // 노랑  (0.01%~0.1%)
  { min:0.007, cls:'tl-r3', color:'#e67e22'  }, // 주황  (0.007%~0.01%)
  { min:0.005, cls:'tl-r4', color:'#e74c3c'  }, // 빨강  (0.005%~0.007%)
  { min:0,     cls:'tl-r5', color:'#9b59b6'  }, // 보라  (0.005% 이하)
];
function tlRarity(rateStr) {
  const r = parseFloat(rateStr);
  if (isNaN(r)) return TL_RARITY[4];
  for (const t of TL_RARITY) if (r >= t.min) return t;
  return TL_RARITY[4];
}
function tlColor(ms) {
  // sqrt 커브: 파랑(240)→빨강(0), 6시간에서도 시안으로 눈에 띄게 변화
  const p = Math.sqrt(Math.min(ms / TL_MAX_MS, 1));
  const h = Math.round(240 - p * 240); // 파랑(240) → 빨강(0)
  const s = Math.round(70 + p * 20);
  const l = Math.round(50 - p * 10);
  return `hsl(${h},${s}%,${l}%)`;
}
const tlShowAllByTab = {};
function tlShowAll() { return tlShowAllByTab[activeTabIdx] || false; }
function tlToggleShowAll() {
  tlShowAllByTab[activeTabIdx] = !tlShowAll();
  const panel = getActivePanel();
  const tab = activeTab();
  if (panel && tab?.mob) {
    renderTimeline(panel, tab.mob, tab);
    const list = panel.querySelector('.sw-log-list');
    if (list) { list.innerHTML = ''; restoreLogEntries(panel, tab.mob); }
  }
}

function tlRowGrad(row) {
  return `linear-gradient(90deg,${tlColor(row*TL_ROW_MS)},${tlColor((row+1)*TL_ROW_MS)})`;
}

function renderTimeline(panel, mob, tab) {
  const section = panel?.querySelector('.tl-section');
  if (!section) return;
  const totalMs = swElapsed(tab);
  if (totalMs < 1000) { section.style.display='none'; return; }
  section.style.display = '';

  const s = loadS();
  const store   = s[`mob_${mob.id}`] || {};
  const excl    = new Set(s[`excl_${mob.id}`] || []);
  const tlBase  = s[`tl_base_${mob.id}`] || null;
  const chMarks = s[`sw_ch_${mob.id}`] || [];

  // tl_base hidden 아이템은 타임라인에서 제외
  const items = [];
  mob.drops.filter(d => !excl.has(d.id) && !(tlBase?.hidden && tlBase.id === d.id)).forEach(d => {
    const st = store[d.id];
    if (!st || st.firstTime == null) return;
    if (tlShowAll()) {
      const allTimes = st.times?.length ? st.times : [st.firstTime];
      allTimes.forEach(t => items.push({ ...d, firstTime: t }));
    } else {
      items.push({ ...d, firstTime: st.firstTime });
    }
  });
  items.sort((a,b) => a.firstTime - b.firstTime);

  const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
  let rowsHtml = '';
  for (let row = 0; row < totalRows; row++) {
    const rStart = row * TL_ROW_MS, rEnd = rStart + TL_ROW_MS;
    const fillPct = totalMs >= rEnd ? 100 : ((totalMs - rStart) / TL_ROW_MS * 100).toFixed(1);
    const rowItems = items.filter(d => d.firstTime >= rStart && d.firstTime < rEnd);

    // 클러스터 그룹핑 (10% 이내 = 같은 클러스터, 1h 기준 ~6분)
    const OVERLAP = 10;
    const clusters = [];
    rowItems.forEach(d => {
      const xPct = (d.firstTime - rStart) / TL_ROW_MS * 100;
      const hit = clusters.find(c => Math.abs(c.xPct - xPct) < OVERLAP);
      if (hit) hit.items.push(d);
      else clusters.push({ xPct, items:[d] });
    });
    const calloutsH = rowItems.length > 0 ? 42 : 0;

    let callHtml = '';
    clusters.forEach(({ xPct, items }) => {
      const cx = Math.min(Math.max(xPct, 2), 98).toFixed(1);
      if (items.length === 1) {
        const d = items[0]; const rar = tlRarity(d.rate);
        callHtml += `<div class="tl-callout" style="left:${cx}%;bottom:0">
          <div class="tl-callout-box ${rar.cls}" title="${escHtml(d.name)}">
            <img src="${itemImg(d.id)}" alt="${escHtml(d.name)}" onerror="onItemImgError(this,${d.id})">
          </div>
          <div class="tl-arrow" style="border-top-color:${rar.color}"></div>
        </div>`;
      } else {
        // 덱으로 쌓기 — 클릭하면 펼쳐짐
        // 유니크 아이템 먼저, 중복은 뒤로 (접힌 상태에서 종류별 대표 아이콘 표시)
        const seenIds = new Set();
        const uniqueItems = [], dupItems = [];
        items.forEach(d => { if (!seenIds.has(d.id)) { seenIds.add(d.id); uniqueItems.push(d); } else dupItems.push(d); });
        const orderedItems = [...uniqueItems, ...dupItems];
        const MAX_VIS = 3; // 접힌 상태 최대 표시 종류 수
        const visCount = Math.min(uniqueItems.length, MAX_VIS);
        const arrowIdx = visCount > 1 ? 1 : 0;
        let wrapsHtml = '';
        orderedItems.forEach((d, i) => {
          const rar = tlRarity(d.rate);
          const rot = i < visCount ? (i - (visCount-1)/2) * 6 : 0; // visible 개수 기준 팬 효과
          const isExtra = i >= MAX_VIS;
          const showArrow = i === arrowIdx;
          wrapsHtml += `<div class="tl-callout-wrap${isExtra?' tl-extra':''}" data-item-id="${d.id}" style="transform:rotate(${rot}deg)">
            <div class="tl-callout-box ${rar.cls}" title="${escHtml(d.name)}">
              <img src="${itemImg(d.id)}" alt="${escHtml(d.name)}" onerror="onItemImgError(this,${d.id})">
            </div>
            ${showArrow ? `<div class="tl-arrow" style="border-top-color:${rar.color}"></div>` : `<div class="tl-arrow-spacer"></div>`}
          </div>`;
        });
        callHtml += `<div class="tl-cluster" style="left:${cx}%" onclick="tlToggleCluster(event,this)">
          ${wrapsHtml}
          <div class="tl-cluster-badge">+${items.length}</div>
        </div>`;
      }
    });

    // 채널변경 마커 (bar-wrap 안에 배치)
    let chHtml = '';
    chMarks.filter(ms => ms >= rStart && ms < rEnd).forEach(ms => {
      const xPct = ((ms - rStart) / TL_ROW_MS * 100).toFixed(1);
      chHtml += `<div class="tl-ch-mark" style="left:${xPct}%"></div>`;
    });

    rowsHtml += `<div class="tl-row" data-row="${row}">
      ${calloutsH > 0 ? `<div class="tl-callouts" style="height:${calloutsH}px">${callHtml}</div>` : ''}
      <div class="tl-bar-zone">
        <div class="tl-bar-wrap"><div class="tl-bar-fill" style="width:${fillPct}%;background:${tlRowGrad(row)}"></div></div>
        ${chHtml}
      </div>
      <div class="tl-time-labels"><span>${row}h</span><span>${row+1}h</span></div>
    </div>`;
  }
  section.querySelector('.tl-rows').innerHTML = rowsHtml;
  const ptitleEl = section.querySelector('.ptitle');
  if (ptitleEl) {
    ptitleEl.innerHTML = `타임라인<button class="tl-toggle-btn${tlShowAll()?' on':''}" onclick="tlToggleShowAll()">${tlShowAll() ? '전체' : '최초만'}</button>`;
  }
}
function deleteChannelEntry(btn) {
  const entry = btn.closest('.sw-log-entry');
  const ms = Number(entry.dataset.chMs);
  if (activeMob) {
    const s = loadS();
    const key = `sw_ch_${activeMob.id}`;
    s[key] = (s[key] || []).filter(t => t !== ms);
    saveS(s);
    renderTimeline(getActivePanel(), activeMob, activeTab());
  }
  entry.remove();
}

function tlToggleCluster(e, el) {
  e.stopPropagation();
  const allWraps = [...el.querySelectorAll('.tl-callout-wrap')];
  const isOpen = el.classList.toggle('open');

  allWraps.forEach(w => { w.querySelector('.tl-dup-badge')?.remove(); w.style.display = ''; });

  if (isOpen) {
    // 같은 아이템 ID는 첫 번째만 표시, 나머지 숨김
    const seen = {};
    const visibleWraps = [];
    allWraps.forEach(w => {
      const id = w.dataset.itemId;
      if (!seen[id]) { seen[id] = { wrap: w, count: 0 }; visibleWraps.push(w); }
      seen[id].count++;
    });
    const visibleSet = new Set(visibleWraps);
    allWraps.forEach(w => { if (!visibleSet.has(w)) w.style.display = 'none'; });

    // ×n 뱃지 (중복 있는 것만)
    Object.values(seen).forEach(({ wrap, count }) => {
      if (count > 1) {
        const b = document.createElement('div');
        b.className = 'tl-dup-badge';
        b.textContent = `×${count}`;
        wrap.appendChild(b);
      }
    });

    // 유니크 아이템들만 펼치기 (37px = 34px 아이콘 + 3px 여백)
    const spread = 37;
    const offset = -(visibleWraps.length - 1) * spread / 2;
    visibleWraps.forEach((w, i) => {
      w.style.transform = `translateX(${offset + i * spread}px) rotate(0deg)`;
      w.style.zIndex = visibleWraps.length - i; // 왼쪽이 위로
    });
    allWraps.forEach(w => { if (!visibleSet.has(w)) { w.style.transform = 'rotate(0deg)'; w.style.zIndex = ''; } });
  } else {
    const visibles = allWraps.filter(w => !w.classList.contains('tl-extra'));
    const vc = visibles.length;
    allWraps.forEach((w, i) => {
      w.style.transform = i < vc ? `rotate(${(i - (vc-1)/2) * 6}deg)` : 'rotate(0deg)';
      w.style.zIndex = '';
    });
  }
}

function restoreLogEntries(panel, mob) {
  const s = loadS();
  const mobStore = s[`mob_${mob.id}`] || {};
  const tlBase   = s[`tl_base_${mob.id}`] || null;
  let itemEntries;
  const drops = mob.drops.filter(d => mobStore[d.id]?.firstTime != null && !(tlBase?.hidden && tlBase.id === d.id));
  if (tlShowAll()) {
    itemEntries = [];
    drops.forEach(d => {
      const times = mobStore[d.id].times?.length ? mobStore[d.id].times : [mobStore[d.id].firstTime];
      times.forEach(ms => itemEntries.push({ ms, isCh: false, id: d.id, name: d.name }));
    });
  } else {
    itemEntries = drops.map(d => ({ ms: mobStore[d.id].firstTime, isCh: false, id: d.id, name: d.name }));
  }
  const chEntries = (s[`sw_ch_${mob.id}`] || []).map(ms => ({ ms, isCh: true }));
  const all = [...itemEntries, ...chEntries].sort((a,b) => b.ms - a.ms);
  const list = panel.querySelector('.sw-log-list');
  all.forEach(e => {
    const el = document.createElement('div');
    if (e.isCh) {
      el.className = 'sw-log-entry sw-log-channel';
      el.dataset.chMs = e.ms;
      el.innerHTML = `<span class="lt">${fmtTimeLog(e.ms)}</span><span class="ln">📡 채널변경</span><button class="ldel" title="삭제" onclick="deleteChannelEntry(this)">✕</button>`;
    } else {
      el.className = 'sw-log-entry';
      el.dataset.dropId = e.id;
      el.innerHTML = `<span class="lt">${fmtTimeLog(e.ms)}</span><span class="ln">${escHtml(e.name)}</span><button class="ldel" title="삭제" onclick="deleteLogEntry(this)">✕</button>`;
    }
    list.appendChild(el);
  });
}

function _swChannelMarkOne(tab, panel) {
  const ms = swElapsed(tab);
  if (ms < 100) return;
  if (tab.mob) {
    const s = loadS();
    const key = `sw_ch_${tab.mob.id}`;
    const chs = s[key] || []; chs.push(ms); s[key] = chs; saveS(s);
  }
  const list = panel?.querySelector('.sw-log-list');
  if (!list) return;
  const entry = document.createElement('div');
  entry.className = 'sw-log-entry sw-log-channel fade-in';
  entry.dataset.chMs = ms;
  entry.innerHTML = `<span class="lt">${fmtTimeLog(ms)}</span><span class="ln">📡 채널변경</span><button class="ldel" title="삭제" onclick="deleteChannelEntry(this)">✕</button>`;
  list.insertBefore(entry, list.firstChild);
  // 채널 경과 표시 초기화 (숨겼어도 다시 보여줌)
  const chEl = panel?.querySelector('.sw-ch-elapsed');
  if (chEl) { delete chEl.dataset.hidden; chEl.style.visibility = ''; if (chEl.style.display === 'none') chEl.style.display = ''; }
  if (tab.mob) renderTimeline(panel, tab.mob, tab);
}

function swChannelMark() {
  const tab = activeTab();
  const panel = getActivePanel();
  _swChannelMarkOne(tab, panel);
  if (tab.synced) {
    tabs.forEach(t => {
      if (t !== tab && t.synced) _swChannelMarkOne(t, getPanelOf(t.idx));
    });
  }
}

function tlUpdateFill(panel, totalMs) {
  const section = panel?.querySelector('.tl-section');
  if (!section) return;
  const totalRows = Math.max(1, Math.ceil(totalMs / TL_ROW_MS));
  const rows = section.querySelectorAll('.tl-row');
  const last = rows[rows.length-1];
  if (!last) return;
  const lastStart = (totalRows-1) * TL_ROW_MS;
  const fill = last.querySelector('.tl-bar-fill');
  if (fill) fill.style.width = Math.min(100, (totalMs-lastStart)/TL_ROW_MS*100).toFixed(1)+'%';
}

function fmtTime(ms) {
  if (ms < 0) ms = 0;
  const h  = Math.floor(ms / 3600000);
  const m  = Math.floor((ms % 3600000) / 60000);
  const s  = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${pad(h)}:${pad(m)}:${pad(s)}.${pad(cs)}`;
}
function fmtTimeLog(ms) {
  if (ms < 0) ms = 0;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function initSw() { /* 탭 생성 시 각 탭에서 초기화 */ }

const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
function mobImg(id)  { return `https://maplestory.io/api/kms/284/mob/${id}/icon`; }
function itemImg(id) { return `https://maplestory.io/api/kms/284/item/${id}/icon`; }
function onItemImgError(img, id) {
  const fb = parseInt(img.dataset.fb || '0');
  if (fb === 0) { img.dataset.fb = '1'; img.src = `https://maplestory.io/api/gms/62/item/${id}/icon`; }
  else { img.src = BLANK; }
}

// 6. 드롭률 배지
// ══════════════════════════════════════════
function rateBadge(r) {
  const n = parseFloat(r);
  if (n >= 1)     return `<span class="rb rb-blue">${r}</span>`;
  if (n >= 0.1)   return `<span class="rb rb-green">${r}</span>`;
  if (n >= 0.01)  return `<span class="rb rb-yellow">${r}</span>`;
  if (n >= 0.007) return `<span class="rb rb-orange">${r}</span>`;
  if (n >= 0.005) return `<span class="rb rb-red">${r}</span>`;
  return                 `<span class="rb rb-purple">${r}</span>`;
}

function renderMobGrid(container, monsters) {
  container.innerHTML = '';
  monsters.forEach(m => {
    const c = document.createElement('div');
    c.className = 'mob-card fade-in';
    c.dataset.mobId = m.id;
    c.innerHTML = `
      <img src="${mobImg(m.id)}" alt="${escHtml(m.name)}" onerror="this.src='${BLANK}'">
      <div class="mn">${escHtml(m.name)}</div>
    `;
    c.addEventListener('click', () => {
      const preset = PRESET.find(p => p.id === m.id || p.name === m.name);
      if (preset) activateMob(preset);                       // 프리셋 우선 (ID 또는 이름)
      else if (m.drops && m.drops.length) activateMob(m);
      else fetchMobDrops(m.id, m.name, m.level);
    });
    container.appendChild(c);
  });
}

// 8. 이름 검색 (프리셋 즉시 필터 + 자동 mapledb 검색)

let searchDebounce = null;

function onNameInput(v) {
  const q = v.trim().toLowerCase();
  const res = document.getElementById('search-results');

  clearTimeout(searchDebounce);

  if (!q) { res.innerHTML = ''; setSearchMsg(''); return; }

  // 프리셋 즉시 표시 (빠른 응답)
  const hits = PRESET.filter(m => m.name.toLowerCase().includes(q));
  if (hits.length) renderMobGrid(res, hits);
  else res.innerHTML = '';

  // 항상 mapledb 전체 검색 (600ms debounce)
  setSearchMsg('⏳ 전체 DB 검색 중...');
  searchDebounce = setTimeout(() => searchByName(), 600);
}

// ══════════════════════════════════════════
// 9. CORS 프록시 (여러 개 순차 시도)
// ══════════════════════════════════════════
async function proxyFetch(url) {
  const proxies = [
    async u => {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
    async u => {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j.contents;
    },
    async u => {
      const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
  ];

  for (const tryProxy of proxies) {
    try {
      const html = await tryProxy(url);
      if (html && html.length > 200) return html;
    } catch {}
  }
  throw new Error('모든 프록시 연결 실패. 잠시 후 다시 시도해주세요.');
}

// ══════════════════════════════════════════
// 10. maplestory.io API로 몬스터 이름 검색
//     (CORS 프록시 불필요, 직접 호출)
// ══════════════════════════════════════════
async function searchByName() {
  const q = document.getElementById('name-input').value.trim();
  if (!q) return;

  setSearchMsg(`⏳ "${q}" 검색 중...`);

  try {
    // 1단계: kms/284로 한국어 이름 검색
    const res = await fetch(
      `https://maplestory.io/api/kms/284/mob?name=${encodeURIComponent(q)}`,
      { signal: AbortSignal.timeout(8000) }
    );
    if (!res.ok) throw new Error(`API 오류 (${res.status})`);
    const data = await res.json();

    const raw = (Array.isArray(data) ? data : [])
      .filter(m => m.name && m.name.includes(q) && m.id < 9000000);

    // 이름 중복 제거 (같은 이름이면 ID 낮은 것만)
    const seen = new Map();
    for (const m of raw) {
      if (!seen.has(m.name) || m.id < seen.get(m.name).id) seen.set(m.name, m);
    }

    let mobs = [...seen.values()]
      .map(m => ({ id: m.id, name: m.name, level: m.level || 0 }))
      .sort((a, b) => {
        const aExact = a.name === q, bExact = b.name === q;
        if (aExact !== bExact) return aExact ? -1 : 1;
        return a.level - b.level;
      });

    if (!mobs.length) {
      setSearchMsg('❌ 검색 결과가 없습니다.'); return;
    }

    // 2단계: 각 결과의 linksTo(클래식 ID) 병렬 조회
    // → 현대 KMS ID → 클래식 ID 변환 (메이플노트와 ID 일치)
    setSearchMsg(`⏳ 클래식 ID 확인 중...`);
    const resolved = await Promise.all(mobs.map(async m => {
      try {
        const r = await fetch(
          `https://maplestory.io/api/kms/284/mob/${m.id}`,
          { signal: AbortSignal.timeout(5000) }
        );
        if (!r.ok) return m;
        const detail = await r.json();
        // linksTo가 있으면 그게 클래식 ID
        if (detail.linksTo && detail.linksTo !== m.id) {
          return { ...m, id: detail.linksTo };
        }
      } catch {}
      return m;
    }));

    // 클래식 ID 중복 제거
    const finalSeen = new Map();
    for (const m of resolved) {
      if (!finalSeen.has(m.id)) finalSeen.set(m.id, m);
    }
    mobs = [...finalSeen.values()];

    setSearchMsg(`✅ ${mobs.length}개 결과`);
    renderMobGrid(document.getElementById('search-results'), mobs);
  } catch(e) {
    setSearchMsg(`❌ ${e.message}`);
  }
}

function parseSearchHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const seen = new Set(); const results = [];
  doc.querySelectorAll('a[href*="t=mob"]').forEach(a => {
    const m = a.href.match(/q=(\d+)&t=mob/);
    if (!m) return;
    const id = parseInt(m[1]);
    if (seen.has(id)) return; seen.add(id);
    const h = a.querySelector('h3,h4,h2,.name');
    let name = h ? h.textContent.trim() : a.textContent.trim().split('\n')[0].trim();
    if (!name) return;
    const lv = a.textContent.match(/Lv\.?\s*(\d+)|레벨\s*(\d+)/);
    results.push({ id, name, level: lv ? parseInt(lv[1]||lv[2]) : 0 });
  });
  return results;
}

async function fetchMobDrops(mobId, knownName, knownLevel) {
  // 0차: 프리셋 우선 (ID 또는 이름)
  const preset = PRESET.find(p => p.id === mobId) || (knownName && PRESET.find(p => p.name === knownName));
  if (preset) { activateMob(preset); return; }

  // 1차: 메이플노트 클래식 (드롭 데이터 정확)
  setLoadMsg('⏳ 메이플노트에서 드롭 데이터 로드 중...');
  try {
    const html = await proxyFetch(`https://xn--o80b01o9mlw3kdzc.com/monster_detail/${mobId}`);
    const mob  = parseMapleNote(html, mobId, knownName, knownLevel);
    if (mob) {
      setLoadMsg(`✅ "${mob.name}" 로드 완료!`);
      activateMob(mob);
      return;
    }
  } catch(e) {}

  // 2차: mapledb.kr 폴백 (메이플노트에 없는 몬스터)
  setLoadMsg('⏳ mapledb.kr에서 드롭 데이터 로드 중...');
  try {
    const html = await proxyFetch(`https://mapledb.kr/search.php?q=${mobId}&t=mob`);
    const mob  = parseMonsterPage(html, mobId, knownName, knownLevel);
    if (!mob) throw new Error('파싱 실패. 올바른 몬스터 ID인지 확인해주세요.');
    setLoadMsg(`✅ "${mob.name}" 로드 완료! (mapledb.kr)`);
    activateMob(mob);
  } catch(e) {
    setLoadMsg(`❌ ${e.message}`, true);
  }
}

function parseMapleNote(html, mobId, fallbackName, fallbackLevel) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const h2   = doc.querySelector('h2');
  const name = (h2 ? h2.textContent.trim() : '') || fallbackName || `몬스터 #${mobId}`;
  let level = 0;
  doc.querySelectorAll('h3').forEach(h => {
    const m = h.textContent.match(/Lv\s*:?\s*(\d+)/);
    if (m && !level) level = parseInt(m[1]);
  });
  if (!level) level = fallbackLevel || 0;
  let hp = 0;
  const hpEl = doc.querySelector('.hp-box');
  if (hpEl) hp = parseInt(hpEl.textContent.replace(/[^0-9]/g, '')) || 0;
  const drops = [];
  const seen  = new Set();
  doc.querySelectorAll('a[href*="item_detail"]').forEach(a => {
    const href = a.getAttribute('href') || '';
    const m    = href.match(/item_detail\/(\d+)/);
    if (!m) return;
    const itemId = parseInt(m[1]);
    if (seen.has(itemId)) return; seen.add(itemId);
    const nameEl   = a.querySelector('h3');
    const itemName = nameEl ? nameEl.textContent.trim() : '';
    if (!itemName) return;
    const txt   = a.textContent.replace(itemName, '');
    const nums  = txt.match(/[\d.]+/g);
    const rate  = nums && nums.length ? `${nums[nums.length - 1]}%` : '?';
    drops.push({ name: itemName, id: itemId, rate });
  });
  if (!drops.length && !h2) return null;
  return { id: mobId, name, level, hp, drops };
}

function parseMonsterPage(html, mobId, fallbackName, fallbackLevel) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 이름
  let name = fallbackName || '';
  if (!name) {
    const h1 = doc.querySelector('h1');
    if (h1) name = h1.textContent.trim();
  }
  if (!name) {
    const t = doc.title.match(/^(.+?)[\s\-|]/);
    if (t) name = t[1].trim();
  }
  if (!name) name = `몬스터 #${mobId}`;

  // 레벨/HP
  const body = doc.body?.innerText || '';
  const lvM = body.match(/(?:레벨|LEVEL)\s*:?\s*(\d+)/i);
  const hpM = body.match(/HP[^\d]*([0-9,]+)/);
  const level = (lvM ? parseInt(lvM[1]) : 0) || fallbackLevel || 0; // mapledb 우선, 없으면 fallback
  const hp    = hpM ? parseInt(hpM[1].replace(/,/g,'')) : 0;

  // 드롭 아이템 (t=item 링크)
  const drops = [];
  const seen = new Set();
  doc.querySelectorAll('a[href*="t=item"]').forEach(a => {
    const m = a.href.match(/q=(\d+)&t=item/);
    if (!m) return;
    const itemId = parseInt(m[1]);
    if (seen.has(itemId)) return; seen.add(itemId);

    const h = a.querySelector('h4,h3,h2,.name,strong');
    let itemName = h ? h.textContent.trim()
      : a.textContent.replace(/드랍율[\s\S]*|[0-9.]+%/g,'').trim();
    if (!itemName) return;

    const rm = a.textContent.match(/([0-9.]+)%/);
    drops.push({ name: itemName, id: itemId, rate: rm ? rm[0] : '?' });
  });

  if (!drops.length && !name) return null;
  return { id: mobId, name, level, hp, drops, fromDB: true };
}

function _applyMsg(el, t, state) {
  if (!t) { el.innerHTML = ''; el.className = 'msg'; return; }
  const iconInner = state === 'loading' ? '' : state === 'done' ? '✓' : state === 'err' ? '✕' : '';
  el.innerHTML = `<span class="msg-icon">${escHtml(iconInner)}</span><span>${escHtml(t)}</span>`;
  el.className = 'msg' + (state ? ` ${state}` : '');
}

function setLoadMsg(t, err=false) {
  const state = err || t.includes('❌') ? 'err' : t.includes('⏳') ? 'loading' : t.includes('✅') ? 'done' : '';
  _applyMsg(document.getElementById('load-msg'), t.replace(/^[⏳✅❌]\s?/, ''), state);
}

function setSearchMsg(t) {
  const state = t.includes('❌') || t.includes('없습니다') ? 'err' : t.includes('⏳') ? 'loading' : t.includes('개 결과') ? 'done' : '';
  _applyMsg(document.getElementById('search-status'), t.replace(/^[⏳✅❌]\s?/, ''), state);
}

function getActivePanel() {
  return document.querySelector(`.tab-panel[data-tab-idx="${activeTabIdx}"]`);
}

function getPanelOf(tabIdx) {
  return document.querySelector(`.tab-panel[data-tab-idx="${tabIdx}"]`);
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.idx === activeTabIdx ? ' active' : '');
    const name = tab.mob ? tab.mob.name : `탭 ${tab.idx + 1}`;
    const imgSrc = tab.mob ? mobImg(tab.mob.id) : '';
    const isRunning = tab.sw.startTs !== null;
    const hasTimer  = tab.sw.base > 0 || isRunning;
    const canSync   = tabs.length >= 2;
    const dotState  = !tab.mob ? '' : isRunning ? 'running' : hasTimer ? 'paused' : canSync ? 'dim' : '';
    const dotTitle  = isRunning ? '타이머 실행 중' : hasTimer ? '일시정지' : canSync ? '동기화 클릭' : '';
    const dotClick  = canSync ? `event.stopPropagation();tabSyncToggle(${tab.idx})` : '';
    const statusDot = dotState
      ? `<span class="tab-status-dot ${dotState}${tab.synced ? ' synced' : ''}${canSync ? ' clickable' : ''}" title="${dotTitle}"${dotClick ? ` onclick="${dotClick}"` : ''}></span>`
      : '';
    btn.innerHTML = `
      ${tab.mob ? `<img src="${imgSrc}" onerror="this.style.display='none'">` : ''}
      <span>${name}</span>
      ${statusDot}
      ${tabs.length > 1 ? `<span class="tab-close" data-tidx="${tab.idx}" onclick="closeTab(event,${tab.idx})">✕</span>` : ''}
    `;
    btn.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) return;
      switchTab(tab.idx);
    });
    btn.draggable = true;
    btn.addEventListener('dragstart', e => {
      _dragTabIdx = tab.idx;
      setTimeout(() => btn.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('drag-over'));
    });
    btn.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (_dragTabIdx !== tab.idx) btn.classList.add('drag-over');
    });
    btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'));
    btn.addEventListener('drop', e => {
      e.preventDefault();
      if (_dragTabIdx >= 0 && _dragTabIdx !== tab.idx) reorderTab(_dragTabIdx, tab.idx);
    });
    bar.appendChild(btn);
  });
  if (tabs.length < MAX_TABS) {
    const add = document.createElement('button');
    add.className = 'tab-add';
    add.textContent = '+';
    add.title = '탭 추가 (최대 8개)';
    add.onclick = addTab;
    bar.appendChild(add);
  }
  updateCharStatus();
}

const CHAR_MOBS = [
  { id: 1130100, name: '엑스텀프' },
  { id: 2130100, name: '다크 엑스텀프' },
];
function updateCharStatus() {
  const el = document.getElementById('char-mobs');

    `<img class="char-mob-img" src="${mobImg(m.id)}" alt="${m.name}" title="${m.name} 클릭하여 도감작 시작" onclick="fetchMobDrops(${m.id},'${m.name}',0)" style="cursor:pointer" onerror="this.style.display='none'">`
  ).join('');
